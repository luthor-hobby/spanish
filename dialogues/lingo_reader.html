xt one."], ["Paulina", "I hope the same. I’ll talk to you later Emilio, I have to finish my homework."], ["Emilio", "Take care a lot. Talk to you later."]]}, {"num": 36, "es": "La cena de anoche", "en": "Last Night’s Dinner", "es_lines": [["Samuel", "Fui a cenar con María anoche."], ["Katherine", "¿Fuiste a cenar con María? ¿Pero no te gustaba Patricia?"], ["Samuel", "Me gustaba Patricia cuando trabajaba con ella en la oficina, pero al parecer hay alguien más que a ella le gusta."], ["Katherine", "¿Y quién planeó la cena?"], ["Samuel", "María me llamo, me dijo que no quería cenar sola y me invitó. Salimos a un bonito restaurante de la ciudad. ¡Ella fue muy adorable y divertida!"], ["Katherine", "Me alegra que resultara así, ¡aunque la próxima vez tú deberías de ser quien la invite a ella!"], ["Samuel", "Ayer le dije eso, que la próxima vez yo invitaría. Además, aunque María fue quien me invitó, a mí me toco pagar la cuenta."], ["Katherine", "¿Y cuánto tiempo tienes conociendo a María?"], ["Samuel", "La conozco desde hace dos meses cuando comencé a trabajar en el banco. Disculpa Kate, debo colgar, María está llamando."], ["Katherine", "Cuídate amigo mío. Espero conocer pronto a María."]], "en_lines": [["Samuel", "I had dinner with Maria last night."], ["Katherine", "You went out for dinner with Maria? But weren’t you interested in Patricia?"], ["Samuel", "I liked Patricia when I worked with her at the office, but apparently there is someone else that she likes."], ["Katherine", "And who planned the dinner?"], ["Samuel", "María called me; she told me that she didn’t want to dine alone. We went out to a nice restaurant of the city. She was so adorable and funny!"], ["Katherine", "I am glad that it turned out like that, although next time you should be the one who invites her!"], ["Samuel", "I told her that yesterday, that next time I would invite her instead. Also, even though Maria was the one who invited me, I was the one who paid the bill."], ["Katherine", "And how long have you known Maria?"], ["Samuel", "I know her since I started to work at the bank two months ago. Excuse me Kate, I need to hang up, Maria is calling."], ["Katherine", "Take care, my friend. I hope to meet Maria soon."]]}, {"num": 37, "es": "Ayer en la playa", "en": "Yesterday at the Beach", "es_lines": [["Paola", "¿Fueron a la playa ayer?"], ["Adrian", "Sí fuimos, te perdiste toda la diversión."], ["Paola", "¿Que hicieron allá?"], ["Adrian", "Jugamos con la arena y voleibol, y varios practicamos surf."], ["Paola", "Que bien, ¿y tomaron el sol y comieron camarones y cangrejos?"], ["Adrian", "Sí, tomamos mucho el sol. Yo no comí nada de mariscos porque soy muy alérgico."], ["Paola", "Que mal por ti. ¿Qué otras cosas hicieron?"], ["Adrian", "Tomamos muchas fotos. En la noche fuimos a una fiesta en la costa."], ["Paola", "¿Había música?"], ["Adrian", "Sí, había música y bailarines. Se parecía a las fiestas de las películas."], ["Paola", "Ya no me cuentes más, me siento triste por no haber ido. Me cuentas luego."], ["Adrian", "Está bien, mejor hablemos de otra cosa."]], "en_lines": [["Paola", "Did you go to the beach yesterday?"], ["Adrian", "Yes, we did, and you missed all the fun."], ["Paola", "What did you do there?"], ["Adrian", "We all played in the sand and some volleyball, and a few of us practiced surf."], ["Paola", "How nice, and did you sunbathe and eat shrimps and crabs?"], ["Adrian", "Yes, we sunbathed a lot. I didn’t eat any seafood because I am allergic."], ["Paola", "Too bad for you. What else did you do?"], ["Adrian", "We took a lot of pictures. At night we went to a party at the coast."], ["Paola", "Was there music?"], ["Adrian", "Yes, there was music and dancers. It looked like the parties from the movies."], ["Paola", "Don’t tell me more, I feel sad for not having gone. Tell me about it later."], ["Adrian", "It’s okay; let’s better talk about something else."]]}, {"num": 38, "es": "De regreso de Amsterdam", "en": "Back from Amsterdam", "es_lines": [["Junior", "Hola Camila, bienvenida. ¿Cómo estuvieron tus vacaciones?"], ["Camila", "¡Estuvieron buenísimas!"], ["Junior", "¿A dónde fuiste?"], ["Camila", "Fui a Ámsterdam por recomendación de un amigo, y no me arrepiento de absolutamente nada."], ["Junior", "Genial, ¿y qué tal fue? ¿Cómo estuvo el clima?"], ["Camila", "Hizo frío, bueno, siempre es frío. Pero me gustó muchísimo."], ["Junior", "¿Qué fue lo que más te gusto?"], ["Camila", "Me gustó todo. La comida es muy deliciosa; los viajes en bicicleta, vi muchas flores. No quería regresar. Fueron las mejores vacaciones de mi vida."], ["Junior", "¿Tienes pensado volver a viajar a Ámsterdam? Creo que podría darle una oportunidad también."], ["Camila", "No lo sé aun, pero sí me gustaría volver. Ven, ayúdame a desempacar mis cosas y así te doy el obsequio que te compré."]], "en_lines": [["Junior", "Hello Camila, welcome back. How were your holidays?"], ["Camila", "They were very, very good!"], ["Junior", "Where did you go?"], ["Camila", "I went to Amsterdam by recommendation of a friend, and I regret absolutely nothing."], ["Junior", "Great and how did you do? How was the weather?"], ["Camila", "It was cold, well, it’s always cold. But I enjoyed it a lot."], ["Junior", "What is it that you liked the most?"], ["Camila", "I liked everything. The food is very delicious; the bicycle trips, I saw a lot of flowers. I didn’t want to come back. Those were the best holidays of my life."], ["Junior", "Do you plan to return to Amsterdam? I think I could give it a chance as well."], ["Camila", "I don’t know yet, but I would like to go back. Come help me unpack my stuff so I can give you the gift I bought for you."]]}, {"num": 39, "es": "Vacaciones familiares en Río de Janeiro", "en": "Family Vacations in Rio de Janeiro", "es_lines": [["Marcos", "Hola Dani, ¿cómo te va?"], ["Daniela", "Bien, Marcos. ¿Tú cómo estás?"], ["Marcos", "¡Muy bien, gracias! ¿Tienes planes para carnaval?"], ["Daniela", "Sí, iré a Río con mi familia a ver los carnavales allá. ¡Estoy tan ansiosa!"], ["Marcos", "¡Oh, que genial! ¿Dónde se van a quedar?"], ["Daniela", "Nos quedaremos en el apartamento de una tía que vive en Copacabana."], ["Marcos", "¿Será tu primera vez en Brasil?"], ["Daniela", "No, esta va a ser mi segunda vez. El año pasado fui con mi hermano a pasar navidades."], ["Marcos", "Deseo que te vaya muy bien en tus vacaciones amiga. Cuídate."]], "en_lines": [["Marcos", "Hello Dani, how are you doing?"], ["Daniela", "I am doing well, Marcos. How are you?"], ["Marcos", "Very well, thank you! Do you have plans for carnival?"], ["Daniela", "Yes, I will go to Rio with my family to see the carnival over there. I am so anxious!"], ["Marcos", "Oh, how great! Where are you going to stay?"], ["Daniela", "We are going to stay at the apartment of an aunt who lives in Copacabana."], ["Marcos", "Will it be your first time in Brazil?"], ["Daniela", "No, this is going to be the second time. Last year I went with my brother to spend Christmas."], ["Marcos", "I wish you well in your holidays, buddy. Take care."]]}, {"num": 40, "es": "¿Adónde viajarías?", "en": "Where would you travel to?", "es_lines": [["Maestra Teresa", "¿Qué vas a hacer cuando seas grande?"], ["Mario", "Viajaré por todo el mundo."], ["Maestra Teresa", "¿En serio? ¿Y qué lugares visitarás?"], ["Mario", "Volaré el Polo Sur, cruzaré el desierto del Sahara en un camello, navegaré todos los mares y subiré todas las montañas."], ["Maestra Teresa", "¿Harás todo eso?"], ["Mario", "Si. Primero quiero ver todo el mundo, subiré el Everest, caminaré por la Gran Muralla de China y me bañare en la cascada del Salto Ángel."], ["Maestra Teresa", "¿Te irás solo?"], ["Mario", "Iré acompañado por mi amigo Martin."], ["Maestra Teresa", "¿Me enviarás alguna foto de tus viajes?"], ["Mario", "¡Claro! Le escribiré desde todos los lugares que llegue a visitar."], ["Maestra Teresa", "Gracias Mario. También me gustaría que me envíes recuerdos de cada lugar, para así poder sentir que he viajado a esos lugares como tú lo harás."], ["Mario", "Me aseguraré de conseguir las mejores cosas de cada lugar y enviárselas junto con mis cartas."], ["Maestra Teresa", "Realmente lo aprecio, Mario."]], "en_lines": [["Teacher Teresa", "What are you going to be when you grow up?"], ["Mario", "I will travel all over the world."], ["Teacher Teresa", "Really? What places are you going to visit?"], ["Mario", "I will fly to the South Pole, I will cross the Sahara desert on the back of a camel, and I will navigate all the seas and climb all the mountains."], ["Teacher Teresa", "Will you do all of that?"], ["Mario", "Yes. First I want to see the whole world, climb the Everest, I will walk the Great Wall of China and I will bathe under the Angel Falls."], ["Teacher Teresa", "Are you going alone?"], ["Mario", "I will be accompanied by my friend Martin."], ["Teacher Teresa", "Will you send me any photographs of your travels?"], ["Mario", "Sure! I will write you from all the places I get to visit."], ["Teacher Teresa", "Thank you Mario. I would also like you to send me souvenirs from each place, so I can feel that I have traveled to those places like you will."], ["Mario", "I will make sure to find the best things from each place and send them to you along with my letters."], ["Teacher Teresa", "I really appreciate it, Mario."]]}, {"num": 41, "es": "Fiesta de fin de año", "en": "New Year’s Eve Party", "es_lines": [["Miriam", "Oye William, tengo una duda."], ["William", "¿Qué duda tienes?"], ["Miriam", "¿Estarás en el almuerzo de fin de año de la empresa?"], ["William", "No estoy seguro aun, ¿tú irás?"], ["Miriam", "Claro que iré. Habrá mucha comida y el jefe dirá unas noticias que nos interesa a nosotros los trabajadores."], ["William", "¿De verdad? ¿A qué hora es? Porque no recuerdo."], ["Miriam", "El almuerzo empieza a las 12:30 pm, deberías asistir."], ["William", "Tratare de asistir. ¿Todos irán?"], ["Miriam", "Si, así es. Todos asistiremos, vendrán los trabajadores de las tiendas comerciales y los de la empresa."], ["William", "¿Será una celebración muy grande?"], ["Miriam", "Si. Primero será el almuerzo, después el jefe dará las noticias, luego habrá música y bebidas para todos."], ["William", "Eso suena muy bien."], ["Miriam", "¿Irás?"], ["William", "En definitiva iré. No me puedo perder este evento."]], "en_lines": [["Miriam", "Hey William, I have a doubt."], ["William", "What’s up?"], ["Miriam", "Will you be at the company’s New Year’s Eve dinner?"], ["William", "I am not sure yet, will you go?"], ["Miriam", "Of course I will. There is going to be a lot of food and the boss will say some news of interest for us the workers."], ["William", "Really? At what time is it? Because I don’t remember."], ["Miriam", "Lunch begins at 12:30 pm, you should show up."], ["William", "I will try to assist. Is everybody going?"], ["Miriam", "Yes, that’s right. Everybody will go: the workers from the commercial stores and the ones from the company."], ["William", "Will it be such a big celebration?"], ["Miriam", "Yes. First it will be lunch, later the boss will give the news, then there is going to be music and drinks for everyone."], ["William", "That sounds really good."], ["Miriam", "Will you go?"], ["William", "I’ll definitely go. I can’t miss this event."]]}, {"num": 42, "es": "Consiguiendo un carro nuevo", "en": "Getting a New Car", "es_lines": [["Yajaira", "Venderé mi carro la próxima semana."], ["Alberto", "¿Por qué lo venderás?"], ["Yajaira", "Ya está por dañarse y no tengo dinero para repáralo. Por ese motivo lo venderé. Fué la recomendación que me dio el mecánico."], ["Alberto", "¿Comprarás un carro nuevo?"], ["Yajaira", "Mi hermano Geraldo me llevará a ver uno que está vendiendo un amigo suyo."], ["Alberto", "Perfecto. Deberías llevar a tu mecánico para que lo revise antes de que lo compres. Yo me compraré una moto este fin de semana."], ["Yajaira", "Sí, lo llevaré. Necesito un mejor auto que no necesite reparaciones. Me parece estupendo que vayas a comprar una moto. Así me llevas de paseo algún día."], ["Alberto", "Me parece buena idea."]], "en_lines": [["Yajaira", "I’m selling my car next week."], ["Alberto", "Why are you going to sell it?"], ["Yajaira", "It’s going to break down soon and I don’t have money to fix it. That’s why I’ll sell it. It was the advice that the mechanic gave me."], ["Alberto", "Will you buy a new car?"], ["Yajaira", "My brother Geraldo will take me to see one that a friend of his is selling."], ["Alberto", "Perfect. You should take your mechanic with you so he can check it out before you buy it. I will buy a motorcycle this weekend."], ["Yajaira", "Yes, I will take him. I need a better car that doesn’t need fixing it. I think it’s great that you are going to buy a bike. That way you can take me to a trip one day."], ["Alberto", "I think it’s a good idea."]]}, {"num": 43, "es": "Comprando zapatos", "en": "Buying Shoes", "es_lines": [["Vendedor", "Bienvenida, ¿en qué puedo ayudarle?"], ["Cliente", "Estoy buscando unos zapatos."], ["Vendedor", "¿Algunos en particular?"], ["Cliente", "Quiero unos zapatos deportivos para practicar futbol; ¿tendrá algunos?"], ["Vendedor", "Sí, por supuesto, tenemos todos estos modelos."], ["Cliente", "¿Tendrá estos en color negro con blanco?"], ["Vendedor", "Sí claro, ¿me podría indicar la talla que los quiere?"], ["Cliente", "Talla 40 por favor."], ["Vendedor", "Aquí está, pruébeselo."], ["Cliente", "¿Es muy pequeño, no tendrá en una talla más grande?"], ["Vendedor", "Lo siento, ese modelo solo tenemos hasta la talla 40. Pero tenemos estos otros que son más grandes."], ["Cliente", "No gracias, yo quería estos, seguiré mirando a ver si me gusta algo más."], ["Vendedor", "También está este de aquí. Es de su tamaño, tiene los mismos colores y solo se diferencia en el patrón del zapato."], ["Cliente", "Bueno, déjeme probarlos un poco."], ["Vendedor", "¿Qué le parece? Son tan cómodos como los que usted quería."], ["Cliente", "Está bien, y se ven muy lindos. Creo que los compraré."], ["Vendedor", "Perfecto. Sígame para indicarle donde pagar."]], "en_lines": [["Salesman", "Welcome, how can I help you?"], ["Client", "I am looking for shoes."], ["Salesman", "Any in particular?"], ["Client", "I want some gym shoes to practice football; do you have any?"], ["Salesman", "Yes, of course, we have all those models."], ["Client", "Do you have these in black and white?"], ["Salesman", "Yes, sure, could you indicate me what size do you want?"], ["Client", "Size 40, please."], ["Salesman", "Here they are, try them out."], ["Client", "They’re very small; do you have a bigger size?"], ["Salesman", "I apologize; we only have that model up to size 40. But we have some others that are bigger."], ["Client", "No thanks, I wanted those, I will keep looking and see if I like something else."], ["Salesman", "We also have this one here. It’s of your size, has the same colors, and the only difference is the pattern of the shoe."], ["Client", "Okay, let me try them out."], ["Salesman", "What do you think? These are as comfortable as the ones you wanted."], ["Client", "Alright, and they look very cute. I think I will buy them."], ["Salesman", "Perfect. Follow me so I can guide you to where you can pay for them."]]}, {"num": 44, "es": "Materia reprobada", "en": "Failed Subject", "es_lines": [["Joselyn", "Hola Armando, ¿cómo has estado?"], ["Armando", "Bien, ¿y tú? ¿Cómo te fue el semestre pasado en tus clases?"], ["Joselyn", "Nada mal, logré pasar todas mis asignaturas. Y a ti, ¿qué tal te fué?"], ["Armando", "No muy bien, no pude pasar todos mis exámenes, por esa razón me quedó una asignatura."], ["Joselyn", "¿Por qué? ¿Estabas tan ocupado que no estudiaste?"], ["Armando", "Así fue como pasó. Estaba trabajando y estudiando a la vez, y se me complicó todo al final de lapso."], ["Joselyn", "¿Cuál asignatura reprobaste?"], ["Armando", "Fallé matemática del segundo año."], ["Joselyn", "Que mal. Ya sabes que debes estudiar mucho para poder aprobar. Espero logres nivelarte para el próximo semestre. Te veo luego."], ["Armando", "Estudiare mucho más. Nos vemos."]], "en_lines": [["Joselyn", "Hello Armando, how have you been?"], ["Armando", "Fine, and you? How did do at your classes last semester?"], ["Joselyn", "Not bad, I managed to pass all of my subjects. And you, how was it for you?"], ["Armando", "Not so well, I could not pass all of my tests and, for that reason, failed a subject."], ["Joselyn", "Why? Were you so busy that you didn’t study?"], ["Armando", "That’s exactly what happened. I was working and studying at the same time, and everything became more complicated at the end of term."], ["Joselyn", "Which subject did you fail?"], ["Armando", "I failed second year Math."], ["Joselyn", "That’s bad. You know you have to study a lot so you can pass. I hope you manage to recover next semester. See you later."], ["Armando", "I will study a lot more. See you."]]}, {"num": 45, "es": "¿Qué hora es?", "en": "What time is it?", "es_lines": [["Mario", "¿Qué hora es? ¡Vamos tarde!"], ["Rosalba", "Falta un cuarto para las siete. Aún estamos a tiempo, no entres en pánico."], ["Mario", "Pero yo pensé que nosotros teníamos que estar en el restaurante de tu amigo para la fiesta sorpresa a las seis y media. ¡Nosotros no debemos hacer eso de nuevo, ya que el tráfico está más que terrible en la noche!"], ["Rosalba", "Seguro, pero no te preocupes. Lo que si necesitamos realmente es ayuda con la dirección. Estamos perdidos. La fiesta sorpresa comienza a las ocho."], ["Mario", "¿Qué? No puede ser. Tenemos que llamar a tu amigo para que él nos pueda indicar la dirección exacta de nuevo."], ["Rosalba", "Quedate tranquilo, aquí tengo un papel con la dirección escrita en ella, pero igual no entiendo algunas cosas."], ["Mario", "¡Mira! ¡En el papel dice que debíamos estar en el lugar de la fiesta a las seis para empezar con los preparativos!"], ["Rosalba", "Jaja sí, bueno, tienes razón. En fin, ya vamos a llegar."]], "en_lines": [["Mario", "What time is it? We are so late!"], ["Rosalba", "It’s a quarter to seven. We still have time, don’t panic."], ["Mario", "But I thought we had to be at your friend’s restaurant at six-thirty. We must not do this again because the traffic is beyong awful during the evening!"], ["Rosalba", "Sure, but don’t worry. What we really need is help with the address. We are lost. The surprise party begins at eight."], ["Mario", "What? It can’t be. We need to call your friend so he can give us the exact address again."], ["Rosalba", "Stay calm, I have a paper with the address written on it, but I still don’t understand a few things."], ["Mario", "Look! On the paper it says that we should be at the party place at six. to begin with the arrangements!"], ["Rosalba", "Haha yeah, well, you are right. Anyway, we are about to arrive."]]}, {"num": 46, "es": "La llamada telefónica", "en": "The Phone Call", "es_lines": [["Lorena", "Hola Alejandro, ¿cómo estás tú?"], ["Alejandro", "¡Oh! ¡Hola Lorena! ¡Justamente estaba pensando en ti!"], ["Lorena", "¿En serio? ¿Qué estabas pensando de mí?"], ["Alejandro", "Pensé que podíamos salir esta noche, si gustas."], ["Lorena", "Por eso te estoy llamando, para ver qué posibilidades hay que vayamos al cine esta noche, pero por lo que veo no habrá ningún problema porque también quieres salir."], ["Alejandro", "Seguro, ¿Qué películas hay en cartelera en este momento?"], ["Lorena", "Yo estaba pensando en una película de comedia llamada Una luna de miel en familia, ¿sabes cuál es?"], ["Alejandro", "¡Suena genial! Pero, ¿y si vemos una de terror? Sería mejor, y más que es de noche."], ["Lorena", "Jaja sí claro, ¿a qué hora te paso buscando?"], ["Alejandro", "Mmm… a las 7 p.m., ¿te parece?"], ["Lorena", "Sí claro, está bien. Déjame pensar con quién dejo a mis niños y luego te digo."], ["Alejandro", "Está bien Lorena, nos vemos ahora."]], "en_lines": [["Lorena", "Hello Alejandro, how are you?"], ["Alejandro", "Oh! Hey Lorena! I was just thinking about you!"], ["Lorena", "Really? What were you thinking about me?"], ["Alejandro", "I thought we might go out tonight, if you want."], ["Lorena", "That is why I am calling you, to see the possibilities of going to the cinema tonight, but as I can see there won’t be any problem because you also want to go out."], ["Alejandro", "Sure, what movies are being shown right now?"], ["Lorena", "I was thinking of a comedy movie called “A Family’s Honeymoon”, do you know which one it is?"], ["Alejandro", "Sounds great! But, what if we watch a horror movie? It would be better, even more because we’re going at night."], ["Lorena", "Haha, yes sure, at what time do you want me to pick you up?"], ["Alejandro", "Mmm… at 7 p.m., do you agree?"], ["Lorena", "Sure, let me think who I can leave my children with and I’ll tell you later."], ["Alejandro", "Alright Lorena, see you later."]]}, {"num": 47, "es": "¿Puedes decir eso otra vez?", "en": "Can You Say That Again?", "es_lines": [["Carmen", "Hola Joseph, ¿cómo están las cosas en tu oficina?"], ["Joseph", "Hola Carmen, ¿Cómo estás tú? ¿Puedes detener la impresora y colocar papel extra para impresiones? Vamos a sacar un gran número de copias y necesitamos que tenga mucha tinta y hojas blancas."], ["Carmen", "¿Qué dijiste Joseph? ¿Puedes repetir el mensaje por favor? ¿Dijiste que coloque la impresora en marcha?  Hay mucha interferencia."], ["Joseph", "¿Puedes escucharme ahora? Tienes que detener la impresora y colocar papel extra para cuando ordenen, imprimir las copias necesarias."], ["Carmen", "Está bien. Pondré la impresora en marcha para comenzar."], ["Joseph", "¡No, Carmen! Escúchame, yo te escribiré a ti por correo para indicarte bien lo que tienes que hacer. ¿De acuerdo?"], ["Carmen", "¿Qué dijo, señor? No lo escucho."], ["Joseph", "Te escribiré por correo Carmen."], ["Carmen", "Está bien señor de acuerdo. Lo siento mi teléfono tiene la recepción muy mal."], ["Joseph", "Está bien, no te preocupes."]], "en_lines": [["Carmen", "Hello Joseph, how is everything going at your office?"], ["Joseph", "Hey Carmen, how are you? Can you stop the printer and add some extra paper for the printing? We are going to print a large number of copies and we need the photocopier to have enough ink and paper."], ["Carmen", "What did you say, Joseph? Can you repeat the message, please? Did you say to put the printer in motion? There is a lot of interference."], ["Joseph", "Can you hear me now? You have to stop the printer and put extra paper in it by the time we get the order to print the necessary copies."], ["Carmen", "Okay. I will turn on the printer immediately."], ["Joseph", "No, Carmen! Listen to me, I will write you via mail to indicate what you need to do. Okay?"], ["Carmen", "What did you say, sir? I can’t hear you."], ["Joseph", "I will write you via mail Carmen."], ["Carmen", "Alright sir, very well. I am sorry; my phone has a pretty bad reception."], ["Joseph", "It’s okay, don’t worry."]]}, {"num": 48, "es": "Coincidencias", "en": "Coincidences", "es_lines": [["Arminda", "¡Bueno, hola Josué! ¡Cuánto tiempo sin verte!"], ["Josué", "¡Arminda! ¡Hola! ¡Ha pasado mucho tiempo! ¿Qué estás haciendo tú aquí?"], ["Arminda", "Yo estoy buscando un nuevo trabajo, aquí en esta ciudad, y estoy comprando algo de ropa aquí. A propósito, ¿qué piensas de esta camisa?"], ["Josué", "Mmm… es muy bonita. Y ¿qué otra ropa has comprado?"], ["Arminda", "Mmm… no mucha, algunas blusas y algunos trajes, ya que el trabajo que pienso tomar es en un hotel y ya sabes, hay que estar elegantes."], ["Josué", "Jaja… sí… tienes razón, esos trabajos son muy exigentes en cuanto a la etiqueta de vestimenta."], ["Arminda", "Y ¿tú qué estás haciendo?"], ["Josué", "Soy supervisor de una tienda de ropa  aquí cerca."], ["Arminda", "Ah… ¡excelente! Ya se quién me va a hacer un descuento en ropa."], ["Josué", "Jajaja. No creo, las personas allí no hacen descuento."], ["Arminda", "Jaja, tranquilo, es una broma. Vamos a tu tienda y muéstrame algunas cosas."]], "en_lines": [["Arminda", "Well, hello Josue! How long has it been since I have seen you!"], ["Josué", "Arminda! Hello! It has been a long time! What are you doing here?"], ["Arminda", "I’m looking for a new job here in this city, and I am buying some clothes here. By the way, what do you think of this shirt?"], ["Josué", "Mmm… it’s very pretty. And, what other clothes have you bought?"], ["Arminda", "Mmm… not many, some blouses and a few suits, because the job I’m thinking of getting is at a hotel and you know, you have to be elegant."], ["Josué", "Haha… Yes… you are right, those jobs are very demanding in terms of dressing etiquette."], ["Arminda", "And what are you doing?"], ["Josué", "I am a clothing store supervisor near here."], ["Arminda", "Haha… Excellent! I know who’s going to give me a discount."], ["Josué", "Haha. I don’t think so, people there don’t give discounts."], ["Arminda", "Haha relax, it’s just a joke. Let’s go to your shop and show me some things."]]}, {"num": 49, "es": "Reporte del clima", "en": "Weather Report", "es_lines": [["Johana", "¡Jonatán! ¿Qué es esto? ¡Se suponía que iba a haber mucho sol según el reporte del tiempo!"], ["Jonatán", "¡Es cierto! ¿Qué pasó con el reporte del tiempo? ¡Está haciendo demasiado frio! Yo pensé que el frio para este tiempo ya habría pasado."], ["Johana", "¡Sí es verdad, yo también pensé lo mismo! Yo leí eso en internet esta mañana."], ["Jonatán", "¡Oh! ¡Mira! ¡Parece que va a llover!"], ["Johana", "¡Mira lo que dicen ahora en la internet! ¡Que habrá mucha lluvia y con eso, mucho frío hoy!"], ["Jonatán", "Jajaja, como cambió el clima de ayer para hoy, ¿verdad? Jajaja…"], ["Johana", "Sí, bueno, vamos a entrar a la casa para no mojarnos."], ["Jonatán", "No se te olvide llamar a tus padres para que no salgan con esta lluvia."], ["Johana", "Sí claro, tienes razón. Mira lo que dicen por la televisión, que hoy será un día de mucho sol."], ["Jonatán", "Jajaja. Apaguemos todo eso y vamos a dormir."]], "en_lines": [["Johana", "Jonatan! What is this? It was supposed to be very sunny according to the weather report!"], ["Jonatan", "That’s true! What happened with the weather report? It’s too cold! I thought that the cold would have passed by this time."], ["Johana", "Yes it’s true, I thought about that too! I read that on the internet this morning."], ["Jonatan", "Oh, look! It seems that it’s about to rain!"], ["Johana", "Look at what they are saying now in the internet! That there will be a lot of rain and, along with that, a lot of cold today!"], ["Jonatan", "Hahaha, what a change the weather has made from yesterday to today, right? Hahaha…"], ["Johana", "Yeah, well, let’s get into the house to avoid getting wet."], ["Jonatan", "Don’t forget to call your parents so they don’t go out with this rain."], ["Johana", "Yes, you are right. Look at what they’re saying on the television, that today will be a very sunny day."], ["Jonatan", "Hahaha. Let’s turn that off and go to sleep."]]}, {"num": 50, "es": "Ordenando comida", "en": "Ordering Food", "es_lines": [["Mary", "Hola, buenos días, yo seré su camarera el día de hoy."], ["Luis", "¡Oh, muy bien gracias!"], ["Mary", "Antes de ordenar su comida, ¿puedo sugerirle una bebida?"], ["Luis", "Sí, por favor. ¿Tiene usted limonada?"], ["Mary", "Sí tenemos. Le traeré una limonada entonces. ¿Está usted listo para ordenar su comida o necesita unos pocos minutos?"], ["Luis", "Yo pienso que yo estoy listo. Yo quiero una sopa de tomate para empezar, luego pollo asado con papas fritas."], ["Mary", "¿Cómo usted quiere su plato? ¿En porción pequeña o grande?"], ["Luis", "Mmm… ¿Cómo es eso señorita?"], ["Mary", "En la carta le indica el tipo de porción."], ["Luis", "Ah… entiendo. Bueno, tráigame la porción grande."], ["Mary", "¿Y para postre?"], ["Luis", "¿Qué tiene para postre?"], ["Mary", "Bueno, el día de hoy tenemos gran variedad. Tenemos pastel de chocolate, pie de limón, pastel de terciopelo rojo, rollos de canela, milhojas, y brownie con helado."], ["Luis", "Hay bastantes opciones. ¿Qué es esa milhoja?"], ["Mary", "Es un postre hecho de varias capas de hojaldre rellena de crema pastelera."], ["Luis", "Suena delicioso. Me gustaría una milhojas y una pieza de pastel de terciopelo rojo."], ["Mary", "Está bien, ¿pagará en cheque o efectivo?"], ["Luis", "Efectivo, señorita."], ["Mary", "Está bien, muchas gracias. Su comida estará lista en pocos minutos."]], "en_lines": [["Mary", "Hello, good morning, I will be your waitress today."], ["Luis", "Oh, thank you very much!"], ["Mary", "Before ordering your food, may I suggest a beverage?"], ["Luis", "Yes, please. Do you have lemonade?"], ["Mary", "Yes, we have. I will bring you lemonade then. Are you ready to order your food or do you need a few minutes?"], ["Luis", "I think I am ready. I want the tomato soup to begin, and then roasted chicken with potato chips."], ["Mary", "How do you want your dish? A small portion or a big one?"], ["Luis", "Mmm… What do you mean?"], ["Mary", "The portion sizes are on the menu."], ["Luis", "Ah… I understand. Well, bring me a big portion."], ["Mary", "And for dessert?"], ["Luis", "What do you have for dessert?"], ["Mary", "Well, today we have a great variety. We have chocolate cake, lemon pie, red velvet cake, cinnamon rolls, Mille-Feuille, and brownie with ice cream."], ["Luis", "There are many options. What is that Mille-Feuille?"], ["Mary", "It’s a dessert made of several layers of puff pastry filled with custard."], ["Luis", "Sounds delicious. I would like a Mille-Feuille and a red velvet piece of cake."], ["Mary", "Very well, will you pay in check or cash?"], ["Luis", "Cash, lady."], ["Mary", "Alright, thank you very much. Your food will be ready in a few minutes."]]}, {"num": 51, "es": "En la oficina del doctor", "en": "At The Doctor’s Office", "es_lines": [["Fernando", "Buenos días señorita, por favor indíqueme su malestar."], ["Abigail", "Bueno, tengo dolor en el oído derecho, y eso me ha provocado un terrible dolor de cabeza; sin embargo, a pesar del dolor, tenía que venir a que me revisara."], ["Fernando", "¿Hace cuánto tiempo que usted tiene el dolor en el oído?"], ["Abigail", "Ya tengo dos semanas con ese dolor."], ["Fernando", "¿Dos semanas? ¡Eso es demasiado! Por eso tiene tanto dolor, y lo del dolor de cabeza es inevitable, ya que esa parte está muy cerca de los nervios que conectan con el cerebro y es lógico que afecte esa parte."], ["Abigail", "Si, yo lo entiendo, y usted ¿qué me recomienda que haga?"], ["Fernando", "Tengo que examinar su oído primero. Antes de proceder déjeme recetarle lo que debe hacer."], ["Abigail", "Está bien, doctor."], ["Fernando", "Debe comprar aspirinas para el dolor de cabeza y gotas antibióticas. Llámeme la semana que viene para ver cómo sigue."], ["Abigail", "Está bien, doctor. Seguiré todas sus indicaciones al pie de la letra."]], "en_lines": [["Fernando", "Good day, miss, please indicate what’s upsetting you."], ["Abigail", "Well, I have a pain in my right ear which has caused me a terrible headache; however, despite the pain, I had planned to come for a check-up anyway."], ["Fernando", "How long has it been since you started suffering from the pain in your ear?"], ["Abigail", "It’s already been two weeks with this pain."], ["Fernando", "Two weeks? That’s too much! Way too much! That’s why you have so much pain; the headache is inevitable, because your ear is too close of the nerves that connect your brain and it’s logical that it affects that organ."], ["Abigail", "Yes, I understand, what do you recommend me to do?"], ["Fernando", "I have to examine your ear first. Before proceeding, allow me to prescribe what you have to do."], ["Abigail", "Alright, doctor."], ["Fernando", "You need to buy these pills for the headache and antibiotic drops for the ear. Call me next week to see how you are doing."], ["Abigail", "Okay, doctor. I will follow all your indications to the very detail."]]}, {"num": 52, "es": "Pidiendo direcciones", "en": "Asking for Directions", "es_lines": [["Mauricio", "Disculpe, buen día. ¿Podría usted indicarme en dónde está la librería?"], ["Maritza", "Buenos días, si, si sé la dirección. Debes caminar dieciséis cuadras, luego bajar por la calle Adams hacia la derecha. Luego bajar cuatro calles hacia la avenida Montoya. Allí encontrarás una zapatería en la esquina, luego cuenta tres tiendas después de esa y encontrarás la librería."], ["Mauricio", "¡Muchas gracias! ¿Pero no queda muy lejos esa librería?"], ["Maritza", "Sí, es lejos desde este punto, y por cierto, ¿por qué te bajaste del bus aquí si aquí te queda más lejos? O sea, tienes que caminar más."], ["Mauricio", "El señor del autobús me dijo que me quedara aquí, que aquí cerca quedaba la librería."], ["Maritza", "Jajaja… ay hijo. Aquí muchos de los lugareños cuando le preguntan por direcciones los mandan para otro lugar así como te acaba de pasar a ti, ¡el conductor te ha tomado el pelo!"], ["Mauricio", "¡No puede ser! ¿De verdad?"], ["Maritza", "Jaja, sí hijo, pero no te preocupes, solo sigue la dirección que te dije y llegarás."], ["Mauricio", "Está bien, ¡muchas gracias señora!"], ["Maritza", "No se preocupe hijo, ¡cuídate mucho!"]], "en_lines": [["Mauricio", "Excuse me, good day. Could you indicate me where the bookstore is?"], ["Maritza", "Good day, yes, I know the address. You have to walk sixteen blocks, and then go down four streets towards Montoya Avenue. There you will find a shoe shop, after which you count four shops, where you will find the bookstore."], ["Mauricio", "Thank you very much! But isn’t the bookstore quite far?"], ["Maritza", "Yes, it is far from this point, and by the way, why did to you get off the bus here if your destination is farther from here? I mean, now you have to walk more."], ["Mauricio", "The bus driver told me to get off here; that the bookstore was near this place."], ["Maritza", "Hahaha… Oh son. Many locals here, when asked for directions, send them to other places like it just happened to you, the bus driver pranked you!"], ["Mauricio", "It can’t be! Really?"], ["Maritza", "Haha, yes son, but don’t worry, just follow the direction that I said and you will be there."], ["Mauricio", "Okay. Thank you very much ma’am!"], ["Maritza", "Don’t worry son, take care!"]]}, {"num": 53, "es": "Llamando por ayuda", "en": "Calling for Help", "es_lines": [["Pedro", "¡Daniela, Daniela! ¿Estás bien?"], ["Daniela", "Sí, ¿qué fue lo que pasó?"], ["Pedro", "¡Tuvimos un accidente!"], ["Daniela", "¿Y tú estás bien, Pedro?"], ["Pedro", "No, no lo estoy, creo que me he fracturado un brazo. ¡Me duele mucho!"], ["Daniela", "¡Llamaré al 911 ahora mismo! ¿Hola? Quiero reportar un accidente que hemos tenido mi novio y yo en la autopista regional cerca del Centro Comercial Chaguaramos. La persona que está conmigo sufrió una fractura en el brazo derecho."], ["Pedro", "¿Qué dijeron, Daniela?"], ["Daniela", "Ellos van a mandar una ambulancia y a los policías ahora mismo. Dicen que llegarán en unos minutos ya que una central se encuentra cerca de aquí."], ["Pedro", "Muy bien, pongámonos seguros y esperemos a  que lleguen."], ["Daniela", "Espera, me dijeron que no deberíamos movernos de nuestro lugar porque podemos estar más lastimados de lo que pensamos."], ["Pedro", "¿Estás segura de eso? ¿Y si el carro explota?"], ["Daniela", "Eso sólo pasa en las películas. Será más peligroso si nos movemos. Ya la ambulancia viene en camino. Recibiremos ayuda muy pronto."], ["Pedro", "Está bien. No quiero que estemos aquí por mucho."]], "en_lines": [["Pedro", "Daniela, Daniela! Are you okay?"], ["Daniela", "Yes, what just happened?"], ["Pedro", "We had an accident!"], ["Daniela", "And are you okay Pedro?"], ["Pedro", "No, I’m not. I think my arm is broken. It hurts a lot!"], ["Daniela", "I’m calling 911 right now! Hello? I want to report an accident that my boyfriend and I had at the regional highway near the Chaguaramos Shopping Mall. The person with me suffered a broken bone in his right arm."], ["Pedro", "What did they say, Daniela?"], ["Daniela", "They are going to send an ambulance and the police right now, and they’ll get here in a few minutes because their headquarters is close from here."], ["Pedro", "Very well, let’s get safe and wait for them to come."], ["Daniela", "Wait, they told me that we shouldn’t move from our place because we could be more injured than we think we are."], ["Pedro", "Are you sure about that? What if the car blows up?"], ["Daniela", "That only happens in movies. It’ll be more dangerous if we move. The ambulance is already in their way. We’ll get help soon."], ["Pedro", "Okay. I don’t want to be here for too long."]]}, {"num": 54, "es": "En la oficina postal", "en": "At the Post Office", "es_lines": [["Lucia", "Hola, muy buenos días, espero que se encuentre bien. ¿Qué puedo hacer yo por usted?"], ["Carlos", "Yo necesito enviar este paquete a la Universidad de Oxford en Inglaterra."], ["Lucia", "Muy bien, por cuestiones de seguridad de la compañía necesitamos visualizar el contenido de la mercancía."], ["Carlos", "Está bien, no hay problema."], ["Lucia", "Ok como puedo ver, usted quiere enviar libros. Permítame pesar el paquete para calcular el precio del envío."], ["Carlos", "¿Cómo es la forma de pago?"], ["Lucia", "En dólares señor, el pago según el peso de este paquete son 10 dólares. Si prefiere el servicio exprés el cual es que el envío llegará mucho más rápido, debe pagar un extra de 10 dólares más."], ["Carlos", "¿Y cuál es la diferencia en días?"], ["Lucia", "Con el servicio normal llegara en aproximadamente 15 días, y con el servicio exprés llegara en un día o dos."], ["Carlos", "Ok, pagaré el exprés entonces si llega más rápido."], ["Lucia", "Ok señor, firme aquí e indíqueme la dirección del envío…"]], "en_lines": [["Lucia", "Hello, good morning, I hope you are well. What can I do for you?"], ["Carlos", "I need to send this package to the Oxford University in England."], ["Lucia", "Very well, for security reasons of the company we need to visualize the content of the goods."], ["Carlos", "Very well, no problem."], ["Lucia", "Okay, as I can see, you want to send books. Allow me to weigh the package to calculate the shipping price."], ["Carlos", "What is the form of payment?"], ["Lucia", "In dollars sir, the price according to this package’s weight is 10 dollars. If you prefer the express service which will allow the package to arrive sooner, you must pay an extra of 10 dollars more."], ["Carlos", "And what is the difference in days?"], ["Lucia", "With the normal service it will arrive in approximately 15 days, but with the express service it will arrive in a day or two."], ["Carlos", "Okay, then I will pay the express service if it arrives much faster."], ["Lucia", "Okay sir, sign here and please indicate the shipping address…"]]}, {"num": 55, "es": "Transporte", "en": "Transport", "es_lines": [["Miguel", "¿Nosotros deberíamos tomar un bus o un taxi para ir al centro comercial?"], ["Rosa", "Vamos a tomar un taxi, es imposible tomar un bus a esta hora. No quedaría espacio para subirnos."], ["Miguel", "Mira los taxis. Hasta ellos vienen llenos. ¿Qué haremos Rosa?"], ["Rosa", "Mmm... Ah, ya sé, vamos a caminar hasta la siguiente parada de autobús. Puede que allí sea posible tomar un taxi libre, o un autobús si viene vacío."], ["Miguel", "¿Qué? ¿Hasta la siguiente parada? ¡Eso queda muy lejos!"], ["Rosa", "Vamos, la siguiente parada está allí mismo. A propósito, ¿trajiste dinero para el taxi verdad?"], ["Miguel", "Si claro, aquí lo tengo. ¡Allá esta la parada!"], ["Rosa", "¿Es esa una parada de autobús?"], ["Miguel", "Sí claro, así es."], ["Rosa", "Mmm… yo no lo creo, además mira, las personas están esperando allá más adelante, no aquí, tú lo que no quieres es caminar."], ["Miguel", "Jaja así es, vamos hacia allá. Creo que ahí si seremos capaces de tomar un taxi o un bus."]], "en_lines": [["Miguel", "Should we take a bus or a taxi to go to the shopping mall?"], ["Rosa", "Let’s take a taxi; it’s impossible to catch a bus at this hour. There wouldn’t be any space left for us to get onto the bus."], ["Miguel", "Look at the taxis. Even they are full. What do we do now, Rosa?"], ["Rosa", "Mmm... Ah, I know, let’s walk to the next bus stop. It might be possible to take a taxi there or a bus if it comes empty."], ["Miguel", "What? To the next stop? That’s so far away!"], ["Rosa", "Come on, the next stop is right there. By the way, you did bring money for the taxi, right?"], ["Miguel", "Yes, sure, here I have it. The stop is over there!"], ["Rosa", "Is that a bus stop?"], ["Miguel", "Yes of course it is."], ["Rosa", "Mmm… I don’t think so, also look, people are waiting down the road, not here, you just don’t want to walk."], ["Miguel", "Haha that’s right, let’s go there. I think we will be able to catch a taxi or bus."]]}, {"num": 56, "es": "¿Qué edad tienes?", "en": "How old are you?", "es_lines": [["Elizabeth", "Yo estoy realmente emocionada por la fiesta sorpresa que le tenemos a mi tía por su cumpleaños."], ["Pablo", "Tranquilízate. A propósito, ¿cuantos años cumplirá tu tía?"], ["Elizabeth", "Ella cumplirá 55 el martes 14 de este mes."], ["Pablo", "Jajaja, pasado mañana. Yo no sabía que ella fuese tan vieja."], ["Elizabeth", "Jaja sí, algo."], ["Pablo", "¿Vendrán tu mama y tus otras tías?"], ["Elizabeth", "Sí, por supuesto, ellas son las que tienen la principal sorpresa para mi tía, claro según ellas, ya que ni a mí me quieren decir, ¡pero debe ser algo impresionante! No olvides decirle a tu mama que venga."], ["Pablo", "No lo voy a olvidar en absoluto, ¿y sobre la comida?"], ["Elizabeth", "Mmm… De eso se encargará una de mis tías. Me dijo que traerá una torta de tres pisos, arroz con pollo, y muchas botanas."], ["Pablo", "Guao… Eso será impresionante entonces."], ["Elizabeth", "¡Sí! Así es. ¡No te lo puedes perder!"], ["Pablo", "Allí estaré. Cuídate mucho, ¡nos vemos este martes que viene en la fiesta!"]], "en_lines": [["Elizabeth", "I am really excited for the surprise birthday party that we have in store for my aunt."], ["Pablo", "Calm down. By the way, how old is your aunt?"], ["Elizabeth", "She will be 55 the 14th of this month."], ["Pablo", "Hahaha, in two days. I didn’t know that she was so old."], ["Elizabeth", "Haha yes, a bit."], ["Pablo", "Will your mom and other aunts come?"], ["Elizabeth", "Yes of course, they are the ones who have the main surprise for my aunt, according to them as they don’t want to even tell me, but it must be something impressive. Don’t forget to tell your mom to come."], ["Pablo", "I’m not going to forget it at all, and what about the food?"], ["Elizabeth", "Mmm… About that, one of my aunts is going to take care of that. She said to me that she will bring a three floor cake, rice and chicken, and a lot of snacks."], ["Pablo", "Wow… Then that will be impressive."], ["Elizabeth", "Yes! That’s right. You can’t miss it!"], ["Pablo", "I’ll be there. Take care of yourself, see you this next Tuesday at the party!"]]}, {"num": 57, "es": "En el cine", "en": "At the Cinema", "es_lines": [["Esteban", "Ya tengo las entradas para el cine, Marta."], ["Marta", "Que bueno Esteban, ¿nos podremos sentar juntos? Te lo digo por los otros muchachos."], ["Esteban", "Sí, claro que sí podremos."], ["Marta", "¿Y qué película veremos?"], ["Esteban", "El amanecer de los muertos, amiga mía."], ["Marta", "Ugh, tú y tus películas de terror, sabes que me da mucho miedo."], ["Esteban", "Jajaja sí, lo sé. Pero es que los otros muchachos también decidieron que la mejor opción era ese género."], ["Marta", "¿Y quiénes van al cine?"], ["Esteban", "Irá Beatriz, Mauricio y Cristian."], ["Marta", "Mmm no creo que haya problema con eso, con tal y todo no termine como la última vez."], ["Esteban", "No te preocupes, no sucederá eso, te paso buscando en 10 minutos por tu casa, ¿sí?"], ["Marta", "No estoy en mi casa. Estoy en casa de mi mamá."], ["Esteban", "Está bien, voy para allá."]], "en_lines": [["Esteban", "I finally have the tickets for the movie Marta."], ["Marta", "That’s good, Esteban. Can we sit together? I’m telling you because of the other guys."], ["Esteban", "Yeah, sure we can."], ["Marta", "And what movie will we watch?"], ["Esteban", "Dawn of the Dead, my friend."], ["Marta", "Ugh, you and your terror movies, you know that they scare me a lot."], ["Esteban", "Hahaha, yes I know. But it’s because the other guys also decided that the best choice was that genre."], ["Marta", "And who is going to the cinema?"], ["Esteban", "Beatriz, Mauricio and Cristian are going."], ["Marta", "Mmm, I don’t think there will be any problem with that, as long as it doesn’t end like the last time."], ["Esteban", "Don’t worry, that won’t happen. I will pick you up in 10 minutes at your house, yes?"], ["Marta", "I am not at my home. I am at my mom’s house."], ["Esteban", "Okay, I am going there."]]}, {"num": 58, "es": "¿Cuál es tu deporte favorito?", "en": "What’s Your Favorite Sport?", "es_lines": [["Antonio", "¿A qué hora es el partido de futbol? Yo creo que eso fue al medio día."], ["Beatriz", "Nosotros debemos haber visto o escuchado mal la hora, pero no importa, por lo menos en mi caso. Yo prefiero el voleibol."], ["Antonio", "¿El voleibol? ¿Qué tiene de interesante el voleibol?"], ["Beatriz", "Es un mejor deporte y que por lo general lo juegan las mujeres, no como el futbol, todos detrás de un balón."], ["Antonio", "Jajaja, ¿y el voleibol no es lo mismo? ¿Las mujeres detrás de un balón para evitar que éste toque el suelo?"], ["Beatriz", "Sí, pero es más estratégico y motivado, y que no requiere de correr como el futbol."], ["Antonio", "Sí, es verdad, pero si se realizara una encuesta, entre a quien le gusta más el futbol o el volibol, ¿cuál ganaría?"], ["Beatriz", "Por supuesto que el futbol. Porque es un deporte que se practica mucho más que los demás."], ["Antonio", "Así es, así que espero no discutamos más acerca de que deporte es mejor, jaja."]], "en_lines": [["Antonio", "At what time is the football game? I think it was at midday."], ["Beatriz", "We must have seen or heard the wrong hour, but it doesn’t matter, at least in my case. I prefer volleyball."], ["Antonio", "Volleyball? What’s interesting about volleyball?"], ["Beatriz", "It’s a better sport and in general is played by women, not like football, everybody running behind a ball."], ["Antonio", "Hahaha, and isn’t volleyball the same thing? Isn’t it a bunch of women behind a ball to avoid it htting the floor?"], ["Beatriz", "Yes, but it’s more strategic and motivated, and it doesn’t require running like in football."], ["Antonio", "Yes, that’s true, but if a survey was made of what people enjoy more between either football or volleyball, who would win?"], ["Beatriz", "Of course it would be football, because it’s a sport that is practiced much more than all the others."], ["Antonio", "That’s right, so I hope we don’t discuss about which sport is better anymore, haha."]]}, {"num": 59, "es": "En la tienda de animales", "en": "At the Pet Store", "es_lines": [["Luisana", "Oh, ¡mira que hermosísimo gato! ¿Qué piensas tú, Moisés?"], ["Moisés", "Yo pienso que es mejor seleccionar un perro. Los perros son mejores que los gatos."], ["Luisana", "Sí es verdad, pero los perros dan mucho trabajo. ¿Te levantarías tu temprano todos los días, sacarlo a pasear y luego limpiar cuando haga sus cosas?"], ["Moisés", "Mmm, buen punto. ¿Qué piensas de un pájaro o un pez?"], ["Luisana", "¡Nosotros ya hemos invertido mucho en cosas para un gato! Ahora no podemos decidirnos por pez o un pájaro."], ["Moisés", "Mmm, es obvio que nosotros no estamos preparados para tener una mascota en este momento."], ["Luisana", "Si tienes razón, pero de todas maneras tendríamos que pensarlo mejor, ¿no crees?"], ["Moisés", "Sí, estas en lo correcto. Vamos a comer algo y beber algo de café y lo conversamos."]], "en_lines": [["Luisana", "Oh, look at that gorgeous cat! What do you think Moises?"], ["Moisés", "I think it’s better to choose a dog. Dogs are better than cats."], ["Luisana", "That is true but dogs give a lot of work. Would you wake up early every day, take it out for a walk and clean when it does its business?"], ["Moisés", "Mmm, good point. What do you think of a bird or a fish?"], ["Luisana", "We have already invested a lot of money in cat things! Right now we can’t choose a fish or a bird."], ["Moisés", "Mmm, it’s obvious that we aren’t ready to get a pet at this moment."], ["Luisana", "Yes, you are right, but anyway we need to think this through better, don’t you think?"], ["Moisés", "Yes, you’re right. Let’s go eat something and drink coffee and we talk about it."]]}, {"num": 60, "es": "Dando una opinión", "en": "Offering an Opinion", "es_lines": [["Wilmer", "¿Dónde deberíamos ir a vacacionar este año? Tenemos que decidir pronto."], ["Ana", "Bueno, a mí me gustaría en un lugar que sea caluroso, ¿Qué tal la playa? ¿O qué te parece si nosotros alquilamos un bote en el lago? Eso también sería una buena opción."], ["Wilmer", "¿Tú quieres ir a la playa otra vez? Yo quiero esquiar en una montaña nevada. ¿Qué pasó con la promesa? ¿Qué paso con viajar a los Alpes en Europa el siguiente Abril?"], ["Ana", "Oh… pero nosotros ya hemos ido a Europa antes. Pero yo no sé si estará soleado o con mucha lluvia. Necesitamos investigar bien sobre eso."], ["Wilmer", "Si, está bien, ¿y que dicen tus padres al respecto?"], ["Ana", "Ellos van a viajar a Nueva York, ya que no quieren ni ir a la playa ni a Europa."], ["Wilmer", "Jajaja, entonces ¿nos libraremos de ellos en estas vacaciones?"], ["Ana", "Jajaja, al parecer sí, pero igual hay que estar seguros."], ["Wilmer", "Entonces, ¿A dónde vamos? Alemania, ¿te parece?"], ["Ana", "Si, es un buen país. Además de que disfrutaremos de las salchichas alemanas y la nieve."]], "en_lines": [["Wilmer", "Where should we go on vacations this year? We need to decide soon."], ["Ana", "Well, I would like to go to a hot place. What about the beach? Or what do you think if we rent a boat at the lake? That would also be a good option."], ["Wilmer", "Do you want to go to the beach again? I want to ski on a snowy mountain. What happened with our promise? What happened with travelling to the Alps in Europe next April?"], ["Ana", "Oh… but we have already gone to Europe before. But I don’t know whether it will be sunny or very rainy. We need to research that properly."], ["Wilmer", "Yeah, alright, and what do your parents say about that?"], ["Ana", "They are going to travel to New York because they don’t want to go to the beach nor Europe."], ["Wilmer", "Hahaha, so are we getting rid of them this vacation?"], ["Ana", "Hahaha, apparently yes, but we still have to be sure."], ["Wilmer", "Then where are we going? What do you think about Germany?"], ["Ana", "Yes, it’s a nice country. Also we will enjoy German sausages and snow."]]}, {"num": 61, "es": "Pasatiempos", "en": "Hobbies", "es_lines": [["Nilson", "Yo estoy feliz de que los exámenes a mitad de semestre hayan finalizado."], ["Elsy", "Lo mismo digo, Nilson, ya era hora de un descanso. Yo estoy buscando un lugar para descansar, no sé, en las montañas este fin de semana. Yo quiero planear un pequeño campamento en el bosque como siempre lo he hecho ya que es parte de uno de mis pasatiempos, y luego voy a tomar una canoa rio abajo si el clima coopera, por supuesto."], ["Nilson", "Oh, que divertido, yo pienso ir al Santo Ángel con mi cámara, ya que me dicen que hay una excelente vista desde allí, ¡que puedes ver muchos kilómetros! ¡Y la cascada es impresionante!"], ["Elsy", "¿Por qué no vienes conmigo a la montaña? La pasaremos muy bien."], ["Nilson", "Jajaja, me encantaría. Pero mi espíritu aventurero no es como el tuyo."], ["Elsy", "Jajaja no digas eso, todos tenemos un espíritu aventurero por dentro. Solo necesita el momento adecuado, ¿no crees?"], ["Nilson", "Sí, tienes razón."], ["Elsy", "Sólo necesito motivarte para que descubras que podrás tener otros pasatiempos además de tomar fotografías."]], "en_lines": [["Nilson", "I’m happy that mid-term tests are over."], ["Elsy", "I think the same Nilson; it was about time we were given a rest. I am looking for a place to rest, I don’t know, perhaps at the mountains this weekend. I want to plan a small camp at the forest as I have always done because it’s part of my hobbies, and then I am going to take a canoe down river if the weather cooperates, of course."], ["Nilson", "Oh, how fun, I think I’m going to Salto Angel with my camera, because people tell me that there’s an excellent view there. That you can see many kilometers in every direction and that the falls are impressive!"], ["Elsy", "Why don’t you come with me to the mountain? We’ll have a great time."], ["Nilson", "Hahaha, I’d love to, but my spirit of adventure is not like yours."], ["Elsy", "Hahaha, don’t say that, we all have an adventurer’s spirit within. It just needs the right moment to reveal itself, don’t you think?"], ["Nilson", "Yes, you are right."], ["Elsy", "I just need to motivate you so that you can discover that you have other hobbies besides taking photographs."]]}, {"num": 62, "es": "Desafíos", "en": "Challenges", "es_lines": [["Peter", "Laura, me gustaría saber ¿cuál es el mayor desafío que conoces personalmente?"], ["Laura", "Bueno, por dónde empiezo: el mayor desafío para mí es el de ser docente ya que muchas personas hablan de que la educación es fácil, pero por falta de información las personas dicen cosas que no son ciertas."], ["Peter", "Eso es cierto. Tratar con estudiantes, ya sean niños, adolescentes o adultos, no es nada fácil, mas en esos lugares donde tienes que atender entre treinta y treinta y cinco estudiantes, ¿te imaginas?"], ["Laura", "Sí, suena algo imposible, pero todo es posible."], ["Peter", "Sí es así, tienes razón."], ["Laura", "¿Y para ti, Peter?"], ["Peter", "Ser oficial de policía. Ellos siempre arriesgan sus vidas por la seguridad de todos."], ["Laura", "Sí así es, Peter. Desafíos en la vida son lo que sobran, pero ser constante nos ayuda a superarlos."], ["Peter", "Bueno Laura, sigue adelante para superar tus desafíos. Yo sé que tú puedes."], ["Laura", "Gracias amigo, besos, cuídate mucho."]], "en_lines": [["Peter", "Laura, I would like to know, what is the biggest challenge you personally know of?"], ["Laura", "Well, where do I begin? The biggest challenge for me is to be a teacher because many people talk about how easy education is, but due to a lack of information people say things that are not true."], ["Peter", "That is true. Dealing with students, whether it’s children, teenagers or adults, is not an easy task, even more so in those places where you have to take care of between thirty to thirty-five students, can you imagine that?"], ["Laura", "Yes, it sounds kind of impossible, but everything is possible."], ["Peter", "Yes, you are right."], ["Laura", "And how about you, Peter?"], ["Peter", "Being a police officer. They always risk their lives for everybody’s safety."], ["Laura", "Yes, that’s right Peter. There is a surplus of challenges, but being determined helps us to overcome them."], ["Peter", "Well Laura, keep fighting to overcome your challenges. I know you can do it."], ["Laura", "Thank you, friend. Kisses, and take care of yourself."]]}, {"num": 63, "es": "Celebraciones", "en": "Celebrations", "es_lines": [["Richard", "¡Ya es diciembre y llega la navidad Megan! ¿Cuáles son tus planes para estos días?"], ["Megan", "¡Sí, es maravilloso! Más que todo porque necesitaba vacaciones; estoy muy cansada. Y mis planes en este momento son de descansar, ¿y los tuyos Richard?"], ["Richard", "Bueno, mi primer  plan es preparar la cena navideña con mi familia para el veinticuatro y el treintaiuno. Mi esposa es venezolana, así que ella me enseñará a preparar hallacas, pernil y pan de jamon."], ["Megan", "Se me había olvidado prepararme para hacer la cena navideña en familia. Y una cena navideña Venezolana suena muy interesante. ¿Qué es una hallaca?"], ["Richard", "Es una especie de tamal cubierto por hojas de banano. Los he probado un par de veces y son más deliciosos de lo que puedo describir."], ["Megan", "¡Increíble! Debes darme a probar una."], ["Richard", "Estás de suerte, porque haremos docenas para comer y compartir con amigos y vecinos."], ["Megan", "Eso espero. ¿Y ya saliste de vacaciones?"], ["Richard", "Sí, ya estoy de vacaciones. Voy a ir a Texas unos días."], ["Megan", "Yo voy a California. Si gustas, vamos al aeropuerto a comprar los boletos juntos."], ["Richard", "Sí, seguro, excelente idea."], ["Megan", "¿Podrás acompañarme mañana?"], ["Richard", "Sí, mañana voy y conversamos más relajados mientras compramos nuestros boletos."], ["Megan", "Está bien amigo. Te veo mañana."]], "en_lines": [["Richard", "It’s December already, and Christmas is coming! What are your plans for these days?"], ["Megan", "Yes, it’s wonderful! More than everything because I needed some vacations. I am very tired. Also, my plans right at this moment are resting; what about yours, Richard?"], ["Richard", "Well, my first plan is to prepare a Christmas dinner with my family and have it ready for the 24th and 31st. My wife is Venezuelan, so she’ll teach me to prepare hallacas, pork shoulder and ham bread."], ["Megan", "I had forgotten about getting ready to make the Christmas dinner in family, and a Venezuelan Christmas dinner sounds very interesting. What is an Hallaca?"], ["Richard", "It’s a type of tamale covered with banana leaves. I have tasted them a couple of times before and they are more delicious that I can describe."], ["Megan", "Incredible! You must give me one to taste it."], ["Richard", "You are lucky because we will make dozens of them to eat and to share with friends and neighbors."], ["Megan", "I hope so. And are you enjoying your holidays already?"], ["Richard", "Yes, I already booked my holidays. I think I’m going to Texas for a few days."], ["Megan", "I’m going to California. If you want, we can go to the airport together to buy the tickets."], ["Richard", "Yes sure, excellent idea."], ["Megan", "Could you go with me tomorrow?"], ["Richard", "Yes, I will go tomorrow and talk in a more relaxed manner while we buy our tickets."], ["Megan", "Okay, friend. See you tomorrow."]]}, {"num": 64, "es": "Programas de TV", "en": "TV Programs", "es_lines": [["Robert", "Pamela, ¿Qué tipo de programas en la televisión te gusta?"], ["Pamela", "De todo un poco, como por ejemplo las novelas, y programas donde hay que pensar y usar la agilidad mental, eso me encanta."], ["Robert", "¿Y por qué te gustan esos tipos de programas?"], ["Pamela", "Porque así aprendo culturas y costumbres de muchos países."], ["Robert", "Sí claro, tienes razón, ese tipo de programa si vale la pena ya que es algo educativo. Y, ¿porque las novelas?"], ["Pamela", "Jajaja porque me gusta ver el romance y el odio a la vez, así como la intriga de saber qué pasara luego."], ["Robert", "A mí no me gustan porque casi todas las historias son el mismo cliché. Aunque hay algunas que me gustan, son pocas porque la mayoría son sobreactuadas y las tramas son confusas y rebuscadas."], ["Pamela", "Pero la vida real también puede ser compleja y obtusa. Igual entiendo tu punto."], ["Robert", "Respeto tus gustos, Pamela. Tal vez un día veamos juntos una novela de tu elección."], ["Pamela", "Perfecto. Buscaré una que crea que te pueda gustar y la vemos juntos."]], "en_lines": [["Robert", "Pamela, what kind of TV programs do you like?"], ["Pamela", "A little bit of everything, for example soaps and programs where you have to think using mental agility, I love that."], ["Robert", "And why do you like those kinds of programs?"], ["Pamela", "Because that way I learn about cultures and customs from other countries."], ["Robert", "Yes, you’re right, that kind of program is worth it because it’s somewhat educative. And why soaps?"], ["Pamela", "Hahaha, because I like to watch romance and hate at the same time, as well as the thrill of wanting to know what will happen next."], ["Robert", "I don’t like them because almost all the stories are the same cliché. Although there are some that I like, most are overacted and their plots are confusing and contrived."], ["Pamela", "But real life can be complex and obtuse as well. Still, I get your point."], ["Robert", "I respect your tastes, Pamela. Maybe one day we will watch a soap of your choice."], ["Pamela", "Perfect. I will seek one that I think you could like and we will watch it together."]]}, {"num": 65, "es": "¡Deportes peligrosos!", "en": "Dangerous Sports!", "es_lines": [["Susan", "Richard, yo estoy segura de que a tí te gustan los deportes extremos y peligrosos."], ["Richard", "Sí, así es. ¿Cómo sabes eso?"], ["Susan", "Me lo imaginé. ¿Cómo te sientes cuando te imaginas que realizarás un deporte peligroso?"], ["Richard", "Mmm, algo emocionado. Una mezcla de estar feliz y nervioso, pero más feliz…"], ["Susan", "Jaja, entiendo ¿hace cuánto que practicas deportes extremos o peligrosos?"], ["Richard", "Hace ya 5 años, me gusta mucho."], ["Susan", "¿Alguna vez has practicado ese deporte, y muy peligroso que es, que consiste en lanzarse de un puente con los pies atados?"], ["Richard", "Jaja, se llama salto bungee y me fascina. Incluso hay personas que sienten tanto nerviosismo que pierden el conocimiento antes de llegar a donde termina la cuerda."], ["Susan", "¿Y la cuerda la revisan?"], ["Richard", "Jaja sí, cada vez que alguien se va a lanzar es revisada, o incluso cada persona tiene su propia cuerda, para no confiarse de la cuerda de alguien más. Bueno, espero te haya servido de mucho esta información."]], "en_lines": [["Susan", "Richard, I am very sure that you like extreme and dangerous sports."], ["Richard", "Yes, that’s right. How do you know that?"], ["Susan", "I figured. How do you feel when you imagine yourself practicing a dangerous sport?"], ["Richard", "Mmm somewhat excited. A mixture of being happy and nervous, but mostly happy …"], ["Susan", "Haha, I understand. How long have you been practicing dangerous and extreme sports?"], ["Richard", "It has been 5 years already; I like it a lot."], ["Susan", "Have you ever practiced that sport, as dangerous as it is, consisting in throwing yourself off a bridge with your feet tied?"], ["Richard", "Haha, it’s called bungee jump and I’m fascinated by it. There are even people who will lose consciousness before reaching the end of the rope out of sheer nervousness."], ["Susan", "And do they check the rope?"], ["Richard", "Haha yes, it is checked every time someone is going to jump, or each person has their own rope to avoid trusting in the one belonging to somebody else. Well I hope this information had been of help."]]}, {"num": 66, "es": "Evitando accidentes", "en": "Avoiding Accidents", "es_lines": [["Sarah", "Roberto necesito que me ayudes con un ensayo acerca de cómo prevenir accidentes."], ["Roberto", "Ok, te ayudaré en lo que pueda."], ["Sarah", "Un punto que el profesor quiere que toque, es cuando salimos en bicicleta."], ["Roberto", "Mmm… Interesante. Bueno lo primero que debes tener en cuenta es siempre utilizar un casco."], ["Sarah", "Sí claro, buen punto. Otro sería verificar si todo está bien en la bicicleta ¿verdad?"], ["Roberto", "Por supuesto, todo debe estar en orden porque que desde algo tan pequeño como un tornillo puede causar un gran accidente."], ["Sarah", "Mirar a los lados, por los carros."], ["Roberto", "Si, claro, y también evitar hablar por teléfono mientras manejas tu bicicleta."], ["Sarah", "Tienes razón, y muchas personas lo hacen hasta conduciendo autos a alta velocidad."], ["Roberto", "También es muy importante no exceder el límite de velocidad, y en vez de casco, los pasajeros deberían llevar cinturones de seguridad."], ["Sarah", "Eso es correcto. Te agradezco toda la ayuda que me has dado, Roberto."], ["Roberto", "La verdad tú estás mejor informada de lo que pensabas, pero espero que mi punto de vista te sirva para tu ensayo."]], "en_lines": [["Sarah", "Roberto I need you to help me with an essay about how to prevent accidents."], ["Roberto", "Okay, I will help you with everything I can."], ["Sarah", "One of the points that the professor wants us to research is when we go out on a bicycle."], ["Roberto", "Mmm… Interesting. Well the first thing that you have to take into account is always using a helmet."], ["Sarah", "Yes, of course, good point. Another would be verifying if everything is fine with the bicycle, right?"], ["Roberto", "Of course, everything must be in order because something as small as a screw can cause a big accident."], ["Sarah", "Look around, because of the cars."], ["Roberto", "Yes, right, and also avoid speaking on the phone while you ride your bicycle."], ["Sarah", "You are right, and many people do it even while driving cars at high speed."], ["Roberto", "It’s also very important not to exceed the speed limit, and instead of a helmet, the passengers should wear safety belts."], ["Sarah", ". That’s correct. Thank you for all the help that you’ve given me, Roberto."], ["Roberto", "Truth be told you are better informed than you thought, but I hope my point of view is helpful for your essay."]]}, {"num": 67, "es": "¡Vamos de excursión a Egipto!", "en": "Let’s Go On a Trip to Egypt!", "es_lines": [["Cristian", "Oh… ¡mira ese camello Valentina! ¡Es algo maravilloso!"], ["Valentina", "Sí, es un animal muy bonito, vamos a montarnos y comenzar el tour."], ["Cristian", "¿Veamos las pirámides, por favor?"], ["Valentina", "Sí, está bien. Pero lleva mucha agua, ya que hace bastante calor."], ["Cristian", "¡Mira esa pirámide!"], ["Valentina", "¡Guao, que increíble! Y mira el tamaño, se ve mucho más grande que en televisión o en internet."], ["Cristian", "Entremos, Valentina."], ["Valentina", "Bueno pero sólo un momento, ya que esos lugares me dan miedo ya que la mayoría son tumbas o se usaron para ejecutar personas."], ["Cristian", "Mira la escritura, ¿no es algo impresionante? Ahora me doy cuenta por que muchas personas se emocionan al ver esto, ¡es algo único!"], ["Valentina", "Sí bueno, ya está bien. Ahora salgamos de aquí y vamos a otro lugar, ya que como te dije estos lugares no me gustan."]], "en_lines": [["Cristian", "Oh… Look at that camel, Valentina! It’s something wonderful!"], ["Valentina", "Yes, it’s a very cute animal, let’s mount it and begin the tour."], ["Cristian", "Let’s watch the pyramids, please?"], ["Valentina", "Yes, okay. But take a lot of water because it’s very hot."], ["Cristian", "Look at that pyramid!"], ["Valentina", "Wow, how incredible! And look at the size; it looks much bigger than on television or the internet."], ["Cristian", "Let’s go in, Valentina."], ["Valentina", "Okay, but just for a moment as I am scared of these places because most of them are tombs or were used to execute people."], ["Cristian", "Look at the writing, isn’t that impressive? Now I realize why so many people get excited when seeing this. It’s something unique!"], ["Valentina", "Yeah, well, that’s enough. Now let’s get out of here and go to another place: as I told you, I don’t like these places."]]}, {"num": 68, "es": "Practicando deportes", "en": "Practicing Sports", "es_lines": [["Cristina", "Hola Rubén, ¿cómo estás? Vamos a jugar hockey, ¿te gustaría?"], ["Ruben", "Si, vamos. Conozco una pista de hielo muy buena."], ["Cristina", "Pero, ¿tu tienes los implementos necesarios para jugar?"], ["Ruben", "Jaja, no entiendo, me invitas y no tienes lo necesario para jugar."], ["Cristina", "Sí, tienes razón, pero se ve muy divertido."], ["Ruben", "Sí, Cristina, sí tengo el equipo necesario. Pero ¿has patinado antes?"], ["Cristina", "No, no lo he hecho."], ["Ruben", "Mmm… Entonces en vez de jugar hockey, ¿por qué no mejor te llevo y te enseño lo básico?"], ["Cristina", "Sí, bueno, tú me enseñas poco a poco ¿sí? ¿Comenzamos hoy mismo?"], ["Ruben", "No hay problema. Te puedo prestar el equipo y enseñarte sobre cómo mantener el balance y cómo desplazarte. También necesitarás casco y rodilleras, porque podrías caer y fracturarte un hueso."], ["Cristina", "No sabía que sería tan peligroso."], ["Ruben", "Si tomas las precauciones, es muy seguro. Y una vez que tengas lo más fundamental, podremos empezar a practicar hockey, ¿te parece?"], ["Cristina", "¡Me encantaría! Está bien, me enseñas poco a poco y luego me dices como se mueve esa cosa negra que usan en vez de pelota."], ["Ruben", "¿Te refieres al disco? Bien, hay que enseñarte más de lo que pensaba, pero veo potencial en tu entusiasmo."]], "en_lines": [["Cristina", "Hello Ruben, how are you? Let’s play hockey, would you like that?"], ["Ruben", "Yes, let’s go. I know a very good ice rink."], ["Cristina", "But, do you have the necessary equipment to play with?"], ["Ruben", "Haha, I don’t understand, you are inviting me but you don’t have the gear to play."], ["Cristina", "Yes, you are right, but it looks like a lot of fun."], ["Ruben", "Yes, Cristina, I have the needed equipment. But have you ever even skated before?"], ["Cristina", "No, I haven’t."], ["Ruben", "Mmm… Then instead of playing hockey, why don’t I take you there and teach you the basics?"], ["Cristina", "Yeah well, you teach me little by little, right? Will we begin today?"], ["Ruben", "There’s no problem; I can lend you the quipment and teach you how to keep you balance and how to move. You will also need a helmet and kneepads, because you could fall and break a bone."], ["Cristina", "I didn’t know it could be so dangerous."], ["Ruben", "If you take precautions, it’s quite safe. And once you get the most fundamental lessons, we can begin to practice hockey. What do you think?"], ["Cristina", "I’d love to! Very well, you teach me bit by bit and then you tell me how to move that black thing that you use instead of a ball."], ["Ruben", "You mean the puck? Okay, there’s more to teach you tan i previously thought, but I can see potential in your enthusiasm."]]}, {"num": 69, "es": "Visitando lugares", "en": "Visiting Places", "es_lines": [["Sam", "Oye, vamos a hacer un tour ¿te parece? Aprovechando que la empresa me dará unos días libres."], ["Miriam", "Puede ser. ¿A dónde quieres ir?"], ["Sam", "Quiero visitar la torre inclinada de Pisa. Siempre me ha dado curiosidad como esa torre se ha mantenido así, y a pesar la historia y las fotos por internet, quisiera verla en persona."], ["Miriam", "Hahaha sí, debe ser muy bonito estar allí y admirar dicho monumento. También podemos ver el coliseo romano, ¿pero y quién costeará todo eso?"], ["Sam", "Yo lo haré, no te preocupes."], ["Miriam", "Está bien, comencemos los preparativos."], ["Sam", "Le puedes decir a tu mama que nos acompañe. Así sale de casa para conocer lugares nuevos."], ["Miriam", "Sí, ¿por qué no? Me hace sentir mal verla en casa todo el día."], ["Sam", "Yo estoy pensando en decirles a mis padres aunque creo que ellos tienen otros planes."], ["Miriam", "Coméntales la idea, así pasamos un momento diferente todos juntos."], ["Sam", "Está bien. Estamos en contacto, Miriam. Vamos a planificar para irnos la semana que viene."]], "en_lines": [["Sam", "Hey, let’s go on a tour, what do you think? I’m taking advantage of the fact that the company is giving me some days off."], ["Miriam", "Sure, maybe. Where do you want to go?"], ["Sam", "I want to visit the Leaning Tower of Pisa. I have always been curious on how that tower has kept itself upright like that, and despite history and photos, I would like to see it in person."], ["Miriam", "Hahaha, yes, it must be very nice to be there and admire the monument in person. We can also go to the Roman Coliseum, but who is going to pay for all that?"], ["Sam", "I will, don’t worry."], ["Miriam", "Okay, let’s begin the arrangements."], ["Sam", "You can tell your mom to join us. That way she gets out of home and sees new places."], ["Miriam", "Yes, why not? It makes me feel bad to see her at home all day."], ["Sam", "I am thinking about telling my parents, although I think they have other plans."], ["Miriam", "Tell them your idea; that way we’ll all have a different experience together."], ["Sam", "Alright. Let’s keep in touch, Miriam. Let’s plan to go next week."]]}, {"num": 70, "es": "Trabajos peligrosos", "en": "Dangerous Jobs", "es_lines": [["Tom", "Bárbara, tengo una encuesta sobre trabajos peligrosos y necesito que me ayudes."], ["Barbara", "Muy Bien, ¿en qué te puedo ayudar?"], ["Tom", "¿Cuáles son los trabajos más peligrosos que tú conoces?"], ["Barbara", "Mmm… Déjame pensar… Bueno, por ejemplo ser oficial de policía o constructor en los edificios altos."], ["Tom", "Mmm muy bien, ¿qué puedes tú decirme sobre ser policía?"], ["Barbara", "Bien, el trabajo es peligroso porque es resguardar la seguridad de las personas, y porque pueden ser agredidos o perseguidos por el odio de los delincuentes hacia ellos."], ["Tom", "Que terrible suena eso, y referente a las personas que construyen edificios, los cuales en este caso, les llaman rascacielos, ¿no?"], ["Barbara", "Sí, bueno, el peligro de ese trabajo es que muchas personas se han resbalado y caído hacia el vacío, causando una muerte instantánea por la altura. No es recomendable para personas que sufren de miedo, y deben estar muy seguros de donde pisan."], ["Tom", "Los peligros que se exponen esas personas. No me gustaría un trabajo así, no, para nada."], ["Barbara", "Espero te haya servido la información para tu encuesta y no dudes en avisarme para ayudar en lo que pueda en un futuro."]], "en_lines": [["Tom", "Barbara, I have a survey about dangerous jobs and I need you to help me."], ["Barbara", "Very well, in what can I help you?"], ["Tom", "Which are the most dangerous jobs that you know?"], ["Barbara", "Mmm… Let me think… Well, for example working as a police officer or a worker on a tall building."], ["Tom", "Mmm very well, what can you tell me about being a police officer?"], ["Barbara", "Well, the job is dangerous because it is about protecting other people and because they can be attacked or chased by spiteful criminals."], ["Tom", "That sounds terrible, and what about the people who work on buildings, which in this case, are called skyscrapers, aren’t they?"], ["Barbara", "Yeah, well, the danger of that job is that many people have slipped and fallen, causing instantaneous death by the amount of meters. It’s not recommended for people who suffer from fear of heights, and they must be very sure to watch their step."], ["Tom", "The dangers that these people expose themselves to isn’t something I’d like to go through at all."], ["Barbara", "I hope the information was of help for your survey and don’t hesitate to notify me to help in whatever I can in the future."]]}, {"num": 71, "es": "Hablando sobre las maravillas del mundo", "en": "Talking About the World’s Wonders", "es_lines": [["Tommy", "Mayra, si fueras jurado para seleccionar maravillas del mundo, ¿cuáles seleccionarías?"], ["Mayra", "Mmm… Bueno, muchos lugares son muy bonitos y hermosos, pero hay que tomar en cuenta la antigüedad, la forma y lo que representa. Yo diría la Muralla China, por la cantidad de kilómetros que tiene; y en lo histórico, se realizó para formar una especie de barrera en el tiempo de guerra. ¿Y tú, Tommy?"], ["Tommy", "Yo votaría por el Cristo Redentor en Brasil ya que es como su protector, y porque es una figura tomada a imagen de Cristo."], ["Mayra", "Mmm… Es cierto, también están las cataratas del Niágara. Además de ser la cascada más grande del mundo, es considerada para muchos un sitio romántico y en el cuál se realizan matrimonios."], ["Tommy", "Si verdad, eso me gusta, ¿y qué sobre el Machu Picchu?"], ["Mayra", "¿Esa es la ciudad perdida, verdad?"], ["Tommy", "Sí, así es, la ciudad perdida."], ["Mayra", "¿Y el Taj Mahal?"], ["Tommy", "Cierto, para muchos es un templo, pero lo que muchos no saben es que fue un acto de amor a la esposa del emperador musulmán Shah Jahan."], ["Mayra", "¡Que romántico! Es muy divertido conversar sobre este tema. Deberíamos hacerlo más a menudo."], ["Tommy", "Si, me parece  genial compartir información."]], "en_lines": [["Tommy", "Mayra, if you were selected as jury to choose the world’s wonders, which ones would you choose?"], ["Mayra", "Mmm… Well, many places are pretty and beautiful, but I have to take in account its age, form and what it represents. I would say the Great Wall of China because of the amount of kilometers it has in length, and history-wise, it was made to form some sort of barrier during warring times. How about you, Tommy?"], ["Tommy", "I would vote for Christ the Redeemer in Brazil as he is somewhat like their protector, and because it’s a figure created from the image of Christ."], ["Mayra", "Mmm… That’s right, but there are also the Niagara Falls. Aside from being the biggest falls in the world, they are considered by many as a romantic place in which many marriages are performed."], ["Tommy", "Yes that’s true, I like that, and what about Machu Picchu?"], ["Mayra", "Is that the lost city?"], ["Tommy", "Yes, it’s the lost city."], ["Mayra", "And the Taj Mahal?"], ["Tommy", "It’s true that for many the Taj Mahal is just a temple, but few know it was an act of love towards the wife of Emperor Shah Jahan."], ["Mayra", "How romantic! It’s really fun to talk about this topic. We should do this more often."], ["Tommy", "Yes, I think it’s great to share information."]]}, {"num": 72, "es": "Animales", "en": "Animals", "es_lines": [["Tim", "Hola Johanna, estaba viendo un documental de animales y me llamó mucho la atención, así que se me ocurrió que me gustaría saber tu opinión al respecto. ¿Te gustan los animales?"], ["Johanna", "Sí, mucho. Casi todos los animales me gustan."], ["Tim", "¿Qué animales no te gustan?"], ["Johanna", "Mmm, el zorrillo es uno de ellos. El animal es bonito, pero como mecanismo de defensa, como ya sabes, libera un olor desagradable que así te bañes, queda en tu cuerpo. Es horrible. Ya me ocurrió."], ["Tim", "¿Dónde te ocurrió eso?"], ["Johanna", "Eso sucedió cuando estaba en Florida. Estaba de campamento con mi familia. Estaba explorando una ladera de la montaña; cuando me percaté del zorrillo ya había liberado su olor y me di cuenta de que tenía su cueva en el costado de la roca en la que estaba descansando. Fue horrible ese momento."], ["Tim", "Sí, me lo imagino, y ¿fue divertido estar allá?"], ["Johanna", "Bueno, aparte de ese momento, si me gustó mucho."], ["Tim", "Jajaja, bueno gracias por esta conversación, me encantó verte Johanna."], ["Johanna", "Igualmente Tim, cuídate mucho."]], "en_lines": [["Tim", "Hello Johanna, I was watching a documental of animals and it attracted my attention, so it occurred to me that I would like to know your opinión about it. Do you like animals?"], ["Johanna", "Yes, a lot. I like almost all animals."], ["Tim", "What animals don’t you like?"], ["Johanna", "Mmm, the skunk is one of them. The animal is cute, but as a defense mechanism, as you may know, releases a nasty smell that remains on your body even if you take a bath. It’s horrible and already happened to me once."], ["Tim", "Where did that happen?"], ["Johanna", "That happened when I was in Florida. I was camping with my family and exploring a mountainside when I noticed the skunk had already released its smell and I realized that its cave was right beside the rock I was resting against. That moment was horrible."], ["Tim", "I can imagine, and was it fun to be there?"], ["Johanna", "Well, apart from that moment, I liked it a lot."], ["Tim", "Hahaha, well thank you for this conversation, I loved to see you Johanna."], ["Johanna", "Same Tim, take care."]]}, {"num": 73, "es": "Transferencia bancaria", "en": "Bank Transfer", "es_lines": [["Marcela", "Hola David, ¿cómo has estado?"], ["David", "Muy bien, gracias."], ["Marcela", "¿Necesitas que te ayude con algo?"], ["David", "Me gustaría transferir algo de dinero."], ["Marcela", "¿A dónde te gustaría transferir el dinero?"], ["David", "Me
