recemos un descanso."]], "en_lines": [["Alejandro", "I’m tired, today has been too much of a long day for my taste! I can’t wait until we finally get to the train station."], ["Natalia", "Yeah, today hasn’t been an easy day for any of us. But don’t worry; we’ll be back home at any minute."], ["Alejandro", "Uh, Natalia? Don’t turn around blatantly, but those guys walking behind us have been following us for a while, I think."], ["Natalia", "Let me see… mmm, yeah? I hadn’t realized that. And they’re watching us right now. This is very strange, what do we do now?"], ["Alejandro", "Walk quickly and let’s try to evade them. Don’t turn around again."], ["Natalia", "Fine, but I’m already feeling nervous."], ["Alejandro", "Don’t fear them, let’s just hurry our pace and be careful. Quick, follow me through here."], ["Natalia", "Okay, we can reach the train station this way as well. Do you think they want to rob us?"], ["Alejandro", "That’s what I think. It’s late and there aren’t many people left on the street. I’m sure they want to mug us, but we won’t stick around to find out."], ["Natalia", "Yeah, you’re right. There’s some stairs this way that lead straight to the station, let’s go."], ["Alejandro", "Yeah, it’s better. Hey, I don’t think they’re on our trail anymore. No, wait, here they come! They’re definitely following us!"], ["Natalia", "I don’t like this at all! Let’s call the police!"], ["Alejandro", "Calm down, there aren’t any officers nearby. Go in here and keep walking. We’ve almost lost them, just watch."], ["Natalia", "Ah, I understand, the train is right there! Go!"], ["Alejandro", "Wow! That was close, my love. Let’s not go out into the city at this time again, it’s not safe. I don’t want anything bad to happen to us."], ["Natalia", "Nor do I. Now let’s go home, we deserve a rest."]]}, {"num": 101, "es": "Sintiéndose mal", "en": "Feeling Unwell", "es_lines": [["Dra. Eva", "Hola Frank, ¿cómo has estado?"], ["Frank", "Bueno doctora, no muy bien. Por eso estoy aquí."], ["Dra. Eva", "Oye, pero que mal. Tenías tiempo sin pasar por acá. ¿Qué te sucede?"], ["Frank", "Regresaron mis problemas estomacales, tengo acidez y dolores abdominales; no estoy en mis mejores momentos."], ["Dra. Eva", "Ay, entiendo. Bueno, ¿supongo que trajiste los resultados de los exámenes de laboratorio, no?"], ["Frank", "Sí, como siempre hago. Aquí tiene."], ["Dra. Eva", "Mmm… ya veo. Bueno, acuéstate que te voy a hacer una ecografía abdominal."], ["Frank", "Perfecto. Espero todo esté relativamente bien; no quiero sorpresas desagradables."], ["Dra. Eva", "Nada de eso, Frank. Tranquilo, sólo relájate."], ["Frank", "Ok. Bueno ya estoy acostado, puedes empezar."], ["Dra. Eva", "Sí. Mmm, ya estoy viendo. Tienes que comer bien, tienes mucha grasa acumulada. Además, tienes problemas de gastritis y del colon. Eso significa que definitivamente vas a tener que comenzar una dieta."], ["Frank", "¿Dieta? Odio las dietas, doctora. ¿No hay otra solución?"], ["Dra. Eva", "La verdad no, Frank. Podrás tragarte mil pastillas, pero sin dieta no valdrá la pena nada de eso que hagas."], ["Frank", "Rayos, eso sí que es una mala noticia. Me gusta comer lo que quiera."], ["Dra. Eva", "Sí, pero eso que has comido hasta ahora te está haciendo daño. De ahora en adelante cero frituras y bebidas gaseosas. Ah, y no más alcohol ni café por varios meses, ¿de acuerdo?"], ["Frank", "¿Quieres matarme?"], ["Dra. Eva", "No, Frank. Quiero salvarte. Ahora déjame terminar para recetarte los medicamentos. Espero que cuando regreses ya estés más delgado y más sano."], ["Frank", "Sí, yo también lo espero. Gracias, doctora."]], "en_lines": [["Dra. Eva", "Hello Frank, how have you been?"], ["Frank", "Well doctor, not so good. Which is why I’m here."], ["Dra. Eva", "Oh, that doesn’t sound nice. You hadn’t come back around here for a while. What’s wrong?"], ["Frank", "My stomach issues are back, I have heartburn and abdominal pain; I’m not in my best moments right now."], ["Dra. Eva", "Ah, I get it. Well, I’m guessing you brought the lab test results, right?"], ["Frank", "Yes, like I always do. Here you go."], ["Dra. Eva", "Mmm… I see. Well, lie down because I’m going to do an abdominal ultrasound on you."], ["Frank", "Perfect. I hope everything is relatively okay; I don’t want uncomfortable surprises."], ["Dra. Eva", "None of that, Frank. Calm down, just relax."], ["Frank", "Ok. Well I’m lying down, you can begin."], ["Dra. Eva", "Yes. Mmm, I’m already seeing it. You have to eat well, you have a lot of accumulated fat. Furthermore, you have gastritis and colon problems. That means you’ll definitely have to begin a diet."], ["Frank", "A diet? I hate diets, doc. Isn’t there another solution?"], ["Dra. Eva", "In truth, Frank, no. You can swallow a thousand pills, but if you don’t follow a diet, none of that will be worth anything."], ["Frank", "Yikes, that sure is very bad news. I love eating whatever I want."], ["Dra. Eva", "Yeah, but it’s precisely that which you’ve eaten which has brought these problems. From now on, no fried food or sodas. Oh, and no more alcohol or coffee for the next few months, okay?"], ["Frank", "Are you trying to kill me?"], ["Dra. Eva", "No, Frank. I’m trying to save you. Now let me finish so that I can tell you what treatment you’ll follow. I hope that when you come back to me you’re thinner and healthier."], ["Frank", "Yeah, I hope so too. Thanks, doctor."]]}, {"num": 102, "es": "¡Que aburrimiento!", "en": "How Boring!", "es_lines": [["Sam", "Nunca pensé que íbamos a estar encerrados durante todo el fin de semana. En serio voy a volverme loco en esta casa, ¡auxilio!"], ["Christina", "Sí, esto es una tortura lenta y dolorosa. Creo que debimos haber viajado con nuestros padres en vez de quedarnos aquí."], ["Sam", "Y pensar que no viajamos porque no queríamos levantarnos temprano para ir."], ["Christina", "Es la peor decisión que hemos tomado en mucho tiempo. Acá no ocurre nada interesante."], ["Sam", "Y si ocurre, nunca dura mucho. ¿No quieres jugar video juegos?"], ["Christina", "La verdad que no. Y tú, ¿quieres jugar baloncesto?"], ["Sam", "Tampoco. Me da flojera. ¿Y si pintamos o dibujamos algo, no sé?"], ["Christina", "Nah. Podríamos ver unas películas, creo. Así pasamos el rato y nos olvidamos de nuestro aburrimiento."], ["Sam", "Puede ser. El problema es que tú y yo tenemos gustos distintos. ¿En qué género pensabas?"], ["Christina", "Algo de comedia, quizás."], ["Sam", "¿Comedia? Lo mío es la acción, la ciencia ficción y el misterio, ¿sabes?"], ["Christina", "Sí sé, pero es cierto que no es lo mío. Bueno, busquemos algo que no sea de ninguno de los dos, para no favorecer a nadie. ¿Romance?"], ["Sam", "No gracias."], ["Christina", "¿Caricaturas?"], ["Sam", "Depende. ¿Las de niños, o ya para todas las edades?"], ["Christina", "Todas las edades."], ["Sam", "De acuerdo. Vamos a ver una."], ["Christina", "Ya empezó. Oye, sigo aburrida, ¿y tú? Esto no está funcionando."], ["Sam", "Tienes razón. Mejor vayamos a caminar. No tengo ganas de nada en realidad, pero será."], ["Christina", "Vamos."]], "en_lines": [["Sam", "I never thought we’d be locked up at home for an entire weekend. I really think we’re going to go insane in this house, help!"], ["Christina", "Yeah, this is a really slow and painful torture. I think we should have gone on that trip with our parents instead of staying behind."], ["Sam", "And to think that we didn’t go with them because we didn’t want to get up early to leave."], ["Christina", "It’s the worst decision we’ve made in a very long time. Nothing interesting happens around here."], ["Sam", "And if it does, it never lasts long. Do you want to play video games?"], ["Christina", "Not really, no. And you, do you want to play basketball?"], ["Sam", "Nope. I feel too lazy. What if we paint or draw something, I dunno?"], ["Christina", "Nah. We could watch some movies, I think. That way we pass the time and forget about our boredom for a while."], ["Sam", "Maybe. The problem is that you and I have different tastes. What genre were you thinking of?"], ["Christina", "Some comedy, maybe."], ["Sam", "Comedy? My favorites are action, science fiction and mystery, you know?"], ["Christina", "I know, but they’re not my favorites either. Well, let’s look for something that isn’t the favorite genre of either of us, so that nobody has an unfair advantage. Romance?"], ["Sam", "No, thank you."], ["Christina", "Cartoons?"], ["Sam", "It depends. Kid cartoons? Or all ages?"], ["Christina", "All ages."], ["Sam", "Alright. Let’s watch one."], ["Christina", "It’s begun. Hey, I’m still bored, and you? This isn’t working at all as we’d hoped."], ["Sam", "You’re right. We should just go for a walk. I don’t feel like doing anything, but I guess that’ll do."], ["Christina", "Okay, let’s go."]]}, {"num": 103, "es": "¡Que frío hace aquí!", "en": "It’s so Cold in Here!", "es_lines": [["Karla", "¡Esta época del año es demasiado extrema! ¡Estoy muriéndome de frío!"], ["Sebastián", "Sí, y eso que estamos bastante abrigados, es como si el clima simplemente pasara a través de toda nuestra ropa."], ["Karla", "A veces siento que vivimos en la Antártida. Parecemos pingüinos, congelándonos por las tormentas de nieve."], ["Sebastián", "Estás exagerando, Karla, pero sí, es terrible."], ["Karla", "Así se hace difícil trabajar, y las calles se llenan de nieve y hielo. Me he caído varias veces esta semana viniendo al trabajo, ¡ya no lo soporto más!"], ["Sebastián", "Lo siento, Karla. Podemos venir juntos si quieres. Te esperaría en la parada de autobús y caminamos hasta acá poco a poco."], ["Karla", "Sería bueno, Sebas. Bueno, se acerca la hora de irnos a casa. Deberíamos ir saliendo. ¿Será que podemos caminar a la parada de autobús juntos?"], ["Sebastián", "De acuerdo. Vaya, sí, el frío está implacable. Este es el invierno más feroz que he presenciado desde que vivo acá. Las calles están prácticamente congeladas y las personas casi no salen a la calle. Si sigue así, podrían paralizar las actividades en las escuelas y los trabajos."], ["Karla", "Amo el calor, ojalá pudiera transportarme a una playa ahorita mismo, en el Caribe con sol, calor y el rico mar a mis pies."], ["Sebastián", "Quizás se pueda, podríamos considerar un escape un fin de semana. ¿Te parece si nos vamos dos días y dos noches a las islas?"], ["Karla", "Me encantaría, en serio. Ojalá pudiera ser ahora mismo. ¡No aguanto más!"]], "en_lines": [["Karla", "The weather this time of the year is way too extreme! I’m freezing to death!"], ["Sebastián", "Yes, even though we’re fully clothed and covered, it’s as if the weather goes right through our clothing."], ["Karla", "Sometimes I feel like we live in the Antartic. We’re like penguins, freezing in the harsh blizzards."], ["Sebastián", "You’re exaggerating, Karla, but yeah, it’s terrible."], ["Karla", "Working becomes a challenge like this, and the streets are filled with snow and ice. I’ve fallen down several times coming to work, I can’t stand it anymore!"], ["Sebastián", "I’m so sorry, Karla. We can walk to work together if you want. I’d wait for you at the bus stop and we could make our way here slowly."], ["Karla", "It would be good, Sebas. Well, it’s almost time to go home. We should start moving. Do you think we could go to the bus stop together?"], ["Sebastián", "Alright. Wow, yeah, the cold is unforgiving. This is the most ferocious winter I’ve ever witnessed here. The streets are practically frozen and people aren’t really going out. If this continues, work and school activities could practically come to a standstill."], ["Karla", "I love the heat; I wish I could travel to a beach right now, with the sun, heat and the lovely sea beneath my feet."], ["Sebastián", "Maybe we could, we should consider escaping for the weekend. What do you think about going to the islands for two days and two nights?"], ["Karla", "I’d love it, really. I wish it could be right now. I can’t stand it any longer!"]]}, {"num": 104, "es": "¡Por favor uis", "Yes Manuela. Today I’ll teach you how to take a free kick, what do you think?"], ["Manuela", "Great, it’s something I’ve wanted to learn. What do I have to do?"], ["Louis", "Well, first you have to stretch and then warm up with three laps around the pitch. I’ll wait here so we can begin."], ["Manuela", "Alright. One… two… three… Ugh, well, I’m ready now. What comes next?"], ["Louis", "First you have to take into account the positioning of the ball. You must know if what you want to do is make a pass to your team mates or if you want to shoot directly on goal."], ["Manuela", "I understand. Well, show me both ways."], ["Louis", "Perfect. Okay, to make a pass, you have to take into consideration that your team mates are in the right position, and that the defense can’t intercept the ball. For example, look at this."], ["Manuela", "Excellent! Very good shot! And what about if I want to shoot directly?"], ["Louis", "Well in that case you have to find your preferred technique. For example, some hit it with force and allow the ball to fall while in mid-air, like this."], ["Manuela", "Impressive! Let me see if I can do the same."], ["Louis", "That wasn’t that good. You must try to keep your body facing down, don’t lean back, because that causes the ball to go flying over the goal. Like this, see? Now you try."], ["Manuela", "Oh, right! Let’s see… wow! I did it!"], ["Louis", "Normally I don’t congratulate my students, but that was very good, Manuela! Think you can pull this off?"], ["Manuela", "Hey, how did you do that? Show me!"], ["Louis", "Like this, look."], ["Manuela", "Let me see… Oh! I did it!"], ["Louis", "You learn quickly, Manuela. Excellent, tomorrow we can continue with the lessons. I think you have a lot of talent. Let’s hope this continues."]]}, {"num": 105, "es": "Una despedida emotiva", "en": "An Emotional Farewell", "es_lines": [["Luisa", "Hola Carlos, que alegría verte el día de hoy. De verdad esperaba que pudiéramos coincidir."], ["Carlos", "Hola Luisa, también me alegra verte, ¿pero por qué siento que tienes algo que decirme? Te noto rara."], ["Luisa", "Sí, hay algo que debo decirte. No es una noticia agradable."], ["Carlos", "¿Qué sucede? Me preocupas, Luisa."], ["Luisa", "Lo que pasa es que hoy termina mi estadía en este hotel; la reservación de mi familia llega hasta hoy y nos regresaremos a nuestro país. Mis padres deben trabajar, yo tengo exámenes a la universidad y la vida debe seguir."], ["Carlos", "¡No puede ser! Y hoy justamente quería invitarte a bailar en la noche. Oh, no… que tristeza, me sentía tan genial a tu lado todos estos días desde que te conocí."], ["Luisa", "Lo sé, Carlos. También me he sentido igual contigo, quizás por eso me pesan tanto estas palabras. Eres un chico muy especial; si fuera por mí, me quedaría a tu lado mucho tiempo más."], ["Carlos", "Guao, nunca me han dicho palabras tan lindas. ¿Crees que algún día te vuelva a ver? Puedo ir a visitarte cuando me haya graduado, aunque sea podemos hablarnos por las redes sociales, y…"], ["Luisa", "Sí, Carlos, pero ya sabes lo que pasa con la distancia y el tiempo, acaban con todo poco a poco. Aún así, confiaré en tus palabras. Creeré en ti y te daré el chance de visitarme más adelante si deseas."], ["Carlos", "Gracias, Luisa. Has causado cosas dentro de mí que nadie más había logrado. Ya me verás llegar a tu puerta con un ramo de rosas y una sonrisa en la cara."], ["Luisa", "¿Y por qué? ¿Por qué soy tan especial para ti que harías eso?"], ["Carlos", "Porque eres única y auténtica, y porque contigo siento que puedo también ser completamente real."], ["Luisa", "Gracias, Carlos. Significa mucho para mí que digas eso. Debo irme, ya se acabó nuestro tiempo aquí."], ["Carlos", "Espera, una cosa más."], ["Luisa", "Oh, ¡me besaste!"], ["Carlos", "Sí. Guárdalo para cuando nos volvamos a ver. Ahora sí puedes irte, hasta pronto."]], "en_lines": [["Luisa", "Hello Carlos, how happy it makes me to see you today. I truly hoped we could meet."], ["Carlos", "Hi Luisa, it also fills me with joy to see you, but why do I feel you have something big to tell me? You look a bit strange today."], ["Luisa", "Yeah, there’s something I must tell you. It’s not a nice piece of news."], ["Carlos", "What’s going on? You’re worrying me, Luisa."], ["Luisa", "Yeah, the thing is that my time at this hotel is about to end; my family’s reservation runs out today and I must return to my country. My parents have to work, I have exams at my university and life must go on."], ["Carlos", "It can’t be! And tonight I was already planning to take you to dance. Oh, no… what a shame, I’ve felt so good these past days since I met you."], ["Luisa", "I know, Carlos. I’ve also felt great with you, which is why these words are so bitter in my mouth. You’re a wonderful guy; if it were for me, I’d stay at your side for much longer."], ["Carlos", "Wow, I’ve never been told such beautiful words. Do you think I’ll ever see you again? I can visit you once I’ve graduated, maybe we can communicate through social media, and…"], ["Luisa", "Yes, Carlos, but you know what happens with enough time and space, they kill everything eventually. Even so, I’ll trust in your words. I’ll believe in you and give you the opportunity of visiting me further ahead."], ["Carlos", "Thanks, Luisa. You’ve caused things in my heart that nobody had previously caused before. Just watch, you’ll see me arrive at your door with a bouquet of flowers and a smile on my face."], ["Luisa", "Why though? Why am I so special to you that you’d do all of that?"], ["Carlos", "Because you’re unique and authentic and because at your side I’ve felt that I can also be completely real."], ["Luisa", "Thank you, Carlos. It means a lot to me that you believe that. I must go, our time here is over."], ["Carlos", "Wait, one more thing."], ["Luisa", "Oh, you kissed me!"], ["Carlos", "Yes. Save it for when we see each other again. Now you can go, see you soon."]]}];
const dlgMap = {};
DIALOGUES.forEach(d => dlgMap[d.num] = d);

/* ── Voice / TTS ── */
let voices = [], currentBtn = null;
const voiceSel   = document.getElementById('voice-sel');
const speedSlider = document.getElementById('speed');
const speedOut   = document.getElementById('speed-out');
const stopBtn    = document.getElementById('stop-btn');

function loadVoices() {
  const all = speechSynthesis.getVoices();
  voices = all.filter(v => v.lang.toLowerCase().startsWith('es'));
  voiceSel.innerHTML = '';
  const list = voices.length ? voices : all;
  list.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = v.name + ' (' + v.lang + ')';
    if (v.lang.toLowerCase() === 'es-es') o.selected = true;
    voiceSel.appendChild(o);
  });
  if (!voices.length) voices = all;
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 500);

speedSlider.addEventListener('input', () =>
  speedOut.textContent = parseFloat(speedSlider.value).toFixed(2) + '×');

function stopSpeech() {
  speechSynthesis.cancel();
  if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn.innerHTML = '&#9654;'; currentBtn = null; }
}
stopBtn.addEventListener('click', stopSpeech);

function speak(text, btn) {
  stopSpeech();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = parseFloat(speedSlider.value);
  u.voice = voices[parseInt(voiceSel.value)] || null;
  const ka = setInterval(() => {
    if (!speechSynthesis.speaking) { clearInterval(ka); return; }
    speechSynthesis.pause(); speechSynthesis.resume();
  }, 10000);
  u.onend = u.onerror = () => {
    clearInterval(ka);
    if (currentBtn === btn) { btn.classList.remove('playing'); btn.innerHTML = '&#9654;'; currentBtn = null; }
  };
  if (btn) { btn.classList.add('playing'); btn.innerHTML = '&#9632;'; currentBtn = btn; }
  speechSynthesis.speak(u);
}

/* ── Render dialogue ── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderDialogue(num) {
  const d = dlgMap[num]; if (!d) return;
  document.getElementById('dlg-title-es').textContent = d.num + '. ' + d.es;
  document.getElementById('dlg-title-en').textContent = d.en;

  const sb = document.getElementById('spanish-block');
  sb.innerHTML = '';
  const enVisible = document.getElementById('en-toggle').dataset.hidden === '';
  d.es_lines.forEach(([speaker, text], i) => {
    const en = d.en_lines[i] || ['', ''];
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML =
      '<div class="line-es">' +
        '<span class="speaker">' + esc(speaker) + '</span>' +
        '<button class="play-btn" aria-label="Play">&#9654;</button>' +
        '<span class="spanish-text">' + esc(text) + '</span>' +
        '<button class="copy-btn" aria-label="Copy line" title="Copy">&#128203;</button>' +
      '</div>' +
      '<div class="line-en' + (enVisible ? '' : ' en-hidden') + '">' +
        '<span class="en-speaker">' + esc(en[0]) + '</span>' +
        '<span class="en-text">' + esc(en[1]) + '</span>' +
      '</div>';
    div.querySelector('.play-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (currentBtn === div.querySelector('.play-btn')) { stopSpeech(); return; }
      speak(text, div.querySelector('.play-btn'));
    });
    div.querySelector('.copy-btn').addEventListener('click', e => {
      e.stopPropagation();
      copyText(text, div.querySelector('.copy-btn'));
    });
    sb.appendChild(div);
  });

  /* tokenise after inserting so we can attach events */
  if (window._lingoTokenize) window._lingoTokenize();

  const allSpanish = d.es_lines.map(([s,t]) => s + ': ' + t).join('\n');
  document.getElementById('shadow-btn').onclick = () =>
    window.open('https://pronunciation-checker-sooty.vercel.app/?sentences=' + encodeURIComponent(allSpanish), '_blank');
}

document.getElementById('en-toggle').addEventListener('click', function() {
  const hidden = this.dataset.hidden === '1';
  if (hidden) {
    this.dataset.hidden = '';
    this.textContent = '\u{1F441} Hide English';
  } else {
    this.dataset.hidden = '1';
    this.textContent = '\u{1F441} Show English';
  }
  document.querySelectorAll('.line-en').forEach(el => el.classList.toggle('en-hidden', !hidden));
});

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    if (!btn) return;
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = '\u2713';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1200);
  });
}

document.getElementById('copy-all-btn').addEventListener('click', function() {
  const d = dlgMap[parseInt(document.getElementById('dlg-select').value)];
  if (!d) return;
  const all = d.es_lines.map(([spk, txt]) => spk + ': ' + txt).join('\n');
  copyText(all, this);
});

const dlgSelect = document.getElementById('dlg-select');
dlgSelect.addEventListener('change', () => {
  stopSpeech();
  renderDialogue(parseInt(dlgSelect.value));
  window.scrollTo({top: 0, behavior: 'smooth'});
});

/* ── Dictionary ── */
/* ── Dictionary lookup ── */
(function () {

  /* 1. Tokenize each .spanish-text into clickable word spans */
  function tokenizeAll() {
    document.querySelectorAll('.spanish-text').forEach(function (el) {
    var newHTML = el.innerHTML.replace(
      /([A-Za-z\xC0-\xFFÀ-ɏ\xF1\xD1]+(?:['\u2019-][A-Za-z\xC0-\xFFÀ-ɏ\xF1\xD1]+)*)/g,
      function (token) {
        var lookup = token.replace(/^['\u2019-]+|['\u2019-]+$/g, '').toLowerCase();
        if (!lookup) return token;
        return '<span class="es-word" data-word="' + lookup + '">' + token + '</span>';
      }
    );
      el.innerHTML = newHTML;
    });
  }
  tokenizeAll();
  window._lingoTokenize = tokenizeAll;

  /* 2. Build popup */
  var popup = document.createElement('div');
  popup.id = 'dict-popup';
  popup.innerHTML =
    '<button id="dict-close" title="Cerrar">&#10005;</button>' +
    '<span class="dp-word"></span>' +
    '<div class="dp-body"></div>' +
    '<hr class="dp-divider">' +
    '<div class="dp-links"></div>';
  document.body.appendChild(popup);

  var dpWord  = popup.querySelector('.dp-word');
  var dpBody  = popup.querySelector('.dp-body');
  var dpLinks = popup.querySelector('.dp-links');

    return fetchWiktionary(word).then(function(es) {
      // If all definitions are "form of X", follow the link to the base form
      var base = getFirstBase(es);
      if (base && base !== word.toLowerCase()) {
        return fetchWiktionary(base).then(function(baseEs) {
          var result = { source: 'wiktionary', entries: baseEs, inflectedFrom: rawWord, baseForm: base };
          dictCache[word] = result; return result;
        }).catch(function() {
          var result = { source: 'wiktionary', entries: es };
          dictCache[word] = result; return result;
        });
      }
      var result = { source: 'wiktionary', entries: es };
      if (word.toLowerCase() !== rawWord.toLowerCase()) result.baseForm = word;
      dictCache[word] = result; return result;
    }).catch(function () {
      return fetch(
        'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(word) + '&langpair=es|en'
      ).then(function (r) { return r.json(); }).then(function (data) {
        var trans = data.responseData && data.responseData.translatedText;
        if (!trans || trans.toLowerCase() === word.toLowerCase()) throw new Error('no trans');
        var alts = (data.matches || [])
          .filter(function (m) {
            return m.quality > 50 && m.translation &&
              m.translation.toLowerCase() !== word.toLowerCase() &&
              m.translation.toLowerCase() !== trans.toLowerCase();
          })
          .map(function (m) { return m.translation; })
          .filter(function (v, i, a) { return a.indexOf(v) === i; })
          .slice(0, 3);
        var result = { source: 'mymemory', translation: trans, alts: alts };
        dictCache[word] = result; return result;
      });
    }).catch(function () {
      var result = { source: 'none' };
      dictCache[word] = result; return result;
    });
  }

  function strip(h) { return h.replace(/<[^>]+>/g, ''); }

  function renderBody(r) {
    if (r.source === 'wiktionary') {
      var html = '';
      // Show a small note when we resolved an inflected form to its base
      if (r.baseForm) {
        html += '<div class="dp-alts">form of <em>' + r.baseForm + '</em></div>';
      }
      r.entries.slice(0, 3).forEach(function (e) {
        html += '<div class="dp-pos">' + (e.partOfSpeech || '') + '</div><ol class="dp-defs">';
        (e.definitions || []).slice(0, 4).forEach(function (d) {
          html += '<li>' + strip(d.definition || '') + '</li>';
        });
        html += '</ol>';
      });
      return html;
    }
    if (r.source === 'mymemory') {
      var h = '<div class="dp-trans">' + r.translation + '</div>';
      if (r.alts && r.alts.length) h += '<div class="dp-alts">also: ' + r.alts.join(', ') + '</div>';
      return h;
    }
    return '<div class="dp-none">no definition found</div>';
  }

  /* 4. Show / position / hide */
  function positionPopup(cx, cy) {
    var pw = popup.offsetWidth || 220, ph = popup.offsetHeight || 130;
    var vw = window.innerWidth, vh = window.innerHeight;
    var left = cx + 14, top = cy + 14;
    if (left + pw > vw - 8) left = cx - pw - 14;
    if (top  + ph > vh - 8) top  = cy - ph - 14;
    if (left < 8) left = 8;
    if (top  < 8) top  = 8;
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';
  }

  function showPopup(word, cx, cy) {
    dpWord.textContent = word;
    dpBody.innerHTML = '<div class="dp-loading">buscando…</div>';
    dpLinks.innerHTML =
      '<a href="https://www.wordreference.com/es/en/translation.asp?spen=' + encodeURIComponent(word) +
        '" target="_blank" rel="noopener">&#128214; WordReference &#8594;</a>' +
      '<a href="https://www.spanishdict.com/translate/' + encodeURIComponent(word) +
        '" target="_blank" rel="noopener">&#128216; SpanishDict &#8594;</a>';
    popup.style.display = 'block';
    positionPopup(cx, cy);
    fetchDefinition(word).then(function (result) {
      if (dpWord.textContent !== word) return;
      dpBody.innerHTML = renderBody(result);
      positionPopup(cx, cy);
    });
  }

  function hidePopup() {
    popup.style.display = 'none';
    if (activeSpan) { activeSpan.classList.remove('dp-active'); activeSpan = null; }
  }

  /* 5. Events */
  document.addEventListener('click', function (e) {
    var wordEl = e.target.closest('.es-word');
    if (wordEl) {
      if (activeSpan) activeSpan.classList.remove('dp-active');
      activeSpan = wordEl;
      wordEl.classList.add('dp-active');
      showPopup(wordEl.dataset.word, e.clientX, e.clientY);
      return;
    }
    if (!e.target.closest('#dict-popup')) hidePopup();
  });

  dpClose.addEventListener('click', function (e) { e.stopPropagation(); hidePopup(); });
})();
/* ── Init ── */
renderDialogue(parseInt(dlgSelect.value));
</script>
</body>
</html>
