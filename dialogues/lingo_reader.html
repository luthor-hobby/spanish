 gustaría a mi cuenta de ahorros."], ["Marcela", "¿Cuánto dinero te gustaría transferir, David?"], ["David", "Me gustaría transferir seiscientos pesos."], ["Marcela", "Está hecho. ¿Será sólo eso o necesitas algo más?"], ["David", "Me gustaría saber cual es ahora mi saldo en mi cuenta corriente."], ["Marcela", "Ok, espera un segundo para chequear. Con los seiscientos pesos que acabas de transferir a tu cuenta, tienes un saldo de tres mil seiscientos pesos."], ["David", "Oh, muchísimas gracias."], ["Marcela", "Estamos para ayudarle. Que tenga buen dia."]], "en_lines": [["Marcela", "Hello David, how have you been?"], ["David", "Very well, thank you."], ["Marcela", "Do you need help with something?"], ["David", "I would like to transfer some money."], ["Marcela", "Where would you like to transfer the money to?"], ["David", "I would like to transfer to my savings account."], ["Marcela", "How much money would you like to transfer, David?"], ["David", "I would like to transfer six hundred Pesos."], ["Marcela", "It’s done. Will it be just that or do you need something else?"], ["David", "I would like to know the balance of my checking account."], ["Marcela", "Okay, wait a moment to check it out. With those six hundred Pesos you just transferred to your account, your balance is now three thousand six hundred Pesos."], ["David", "Oh, thank you very much."], ["Marcela", "We are here to help you. Have a nice day."]]}, {"num": 74, "es": "Vacaciones de verano en el Caribe", "en": "Summer Vacations in the Caribbean", "es_lines": [["Erika", "Buenos días, me gustaría reservar una habitación."], ["Sebastian", "Buenos días, ¿me podría indicar su nombre por favor?"], ["Erika", "Mi nombre es Erika Hernández."], ["Sebastian", "Disculpe no le he entendido bien, ¿es su apellido Hernández o Fernández?"], ["Erika", "Es Hernández, H-e-r-n-a-n-d-e-z."], ["Sebastian", "Ok, gracias Sra. Hernández. Yo soy Sebastián, estoy para ayudarle. ¿Por cuántos días quiere su reservación, señora?"], ["Erika", "Pienso quedarme por una semana desde el 15 de junio, y así pasar mis vacaciones de verano en el Caribe."], ["Sebastian", "Ok Sra. Hernández, en efecto tenemos habitaciones disponibles para la fecha, sólo que las mismas presentan un incremento adicional por la temporada."], ["Erika", "¿De cuánto estamos hablando?"], ["Sebastian", "Ciento cincuenta dólares por noche."], ["Erika", "No se preocupe, es perfecto el precio."], ["Sebastian", "Perfecto. ¿Desea alguna vista en particular? Tenemos habitaciones con vista al mar, al arrecife, y a la piscina."], ["Erika", "Vista al mar, por favor."], ["Sebastian", "¿Desea que la habitación tenga cama queen size, y jacuzzi privado?"], ["Erika", "Suena de maravillas."], ["Sebastian", "Ok Sra. Hernández, su reservación está casi hecha. Sólo necesito que me suministre un número de teléfono."], ["Erika", "57 5551234."], ["Sebastian", "Muchas gracias Sra. Hernández. Su reservación está completa, ¡que tenga feliz día!"]], "en_lines": [["Erika", "Good day, I would like to book a room."], ["Sebastian", "Good day, can you tell me your name, please?"], ["Erika", "My name is Erika Hernández."], ["Sebastian", "Excuse me, I didn’t get that, is your last name Hernandez or Fernandez?"], ["Erika", "It’s Hernandez, H-e-r-n-a-n-d-e-z."], ["Sebastian", "Ok, thank you Mrs. Hernandez. I’m Sebastian and I’m here to help you. For how many days do you want to book, ma’am?"], ["Erika", "I want to stay for a week beginning on June the 15th, so I can spend my summer vacations in the Caribbean."], ["Sebastian", "Ok Mrs. Hernandez, we have vacant rooms for the chosen date, though they will come included with an additional increase in price due to the holiday season."], ["Erika", "How much are we talking about?"], ["Sebastian", "One hundred and fifty dollars per night."], ["Erika", "Don’t worry, the price is perfect."], ["Sebastian", "Excellent. Do you wish for a view in particular? We have rooms with an ocean view, a reef view and a pool view."], ["Erika", "Ocean view, please."], ["Sebastian", "¿Do you wish the room to have a queen-size bed and private jacuzzi?"], ["Erika", "Sounds wonderful."], ["Sebastian", "Ok Mrs. Hernandez, your reservation is almost done. I just need you to hand me over a phone number."], ["Erika", "57 5551234."], ["Sebastian", "Thank you very much Mrs. Hernandez. Your reservation is complete. Have a nice day!"]]}, {"num": 75, "es": "Bebidas en el bar", "en": "Bar Drinks", "es_lines": [["Pablo", "Buenas noches, señorita, ¿en qué puedo ayudarle?"], ["Carla", "Buenas noches, señor. Disculpe, ¿puede mostrarme la carta de vinos por favor?"], ["Pablo", "La carta de vinos está en la última página de su menú, señora."], ["Carla", "¿Preparan cocteles en este restaurante?"], ["Pablo", "Si, por supuesto. Nuestro bar tiene una gran variedad de tragos y cocteles para ofrecer."], ["Carla", "No estoy segura qué tomar. ¿Tienen algún trago especial?"], ["Pablo", "En este momento puedo recomendarle un mojito cubano o un tradicional margarita."], ["Carla", "Perfecto, tráigame por favor una margarita."], ["Pablo", "¿Le gustaria batido o a las rocas?"], ["Carla", "Batido, por favor."], ["Pablo", "¿Le gustaría con sal o sin ella?"], ["Carla", "Me gusta tomar margaritas con sal, gracias."], ["Pablo", "Aquí tiene, que lo disfrute."], ["Carla", "Muchas gracias."]], "en_lines": [["Pablo", "Good evening lady, how can I help you?"], ["Carla", "Good evening, sir. Excuse me, can you show me the wine list, please?"], ["Pablo", "The wine list is at the last page of your menu, madam."], ["Carla", "Do you prepare cocktails at this bar?"], ["Pablo", "Yes, of course. Our bar has a great variety of cocktails to offer."], ["Carla", "I am not sure what to drink. Do you have any special drink?"], ["Pablo", "Right at this moment I can recommend you a Cuban Mojito or a traditional Margarita."], ["Carla", "Perfect. Bring me a Margarita please."], ["Pablo", "Would you like it shaken or on the rocks?"], ["Carla", "Shaken please."], ["Pablo", "Would you like it with or without salt?"], ["Carla", "I like to drink Margaritas with salt, thanks."], ["Pablo", "Here you go, I hope you like it."], ["Carla", "Thank you very much."]]}, {"num": 76, "es": "Pidiendo la cena", "en": "Ordering Dinner", "es_lines": [["Ana", "Bienvenido, ¿puedo tomar su orden?"], ["Luis", "Quisiera una hamburguesa con queso."], ["Ana", "¿Le gustaría la hamburguesa con todo?"], ["Luis", "Si por favor, con todo pero sin mostaza."], ["Ana", "¿Quisiera papas fritas o aros de cebolla con su orden?"], ["Luis", "Papas fritas, por favor."], ["Ana", "¿Que le gustaría de bebida? Tenemos refrescos, té helado y agua."], ["Luis", "Quisiera una Coca-Cola grande"], ["Ana", "¿Eso es todo, o desea algo más?"], ["Luis", "Eso es todo, gracias."], ["Ana", "Por nada, su orden es de un total de veinte dólares."], ["Luis", "Tenga y gracias."]], "en_lines": [["Ana", "Welcome, can I take your order?"], ["Luis", "I would like a cheese burger, please."], ["Ana", "Would you like your burger with everything?"], ["Luis", "Yes please, everything but mustard."], ["Ana", "Would you like French Fries or onion rings with your order?"], ["Luis", "French Fries, please."], ["Ana", "What would you like to drink? We have soda, iced tea and water."], ["Luis", "I would like a big Coca-Cola."], ["Ana", "Is that all or do you want something else?"], ["Luis", "That is all, thank you."], ["Ana", "You’re welcome. Your order will be twenty dollars."]]}, {"num": 77, "es": "Pidiendo la cena", "en": "Ordering Dinner", "es_lines": [["Antonio", "Hola, ¿cómo estas?"], ["Beatriz", "Muy bien, ¿y tú?"], ["Antonio", "Bien."], ["Beatriz", "Me alegra oír eso."], ["Antonio", "¿Cuánto tiempo tienes estudiando en esta universidad?"], ["Beatriz", "Tengo ya dos años, ¿y tú?"], ["Antonio", "Este es mi primer año."], ["Beatriz", "¿Qué tal te parece la universidad?"], ["Antonio", "Me parece muy bien."], ["Beatriz", "¿Cómo vas con tus clases y tus maestros?"], ["Antonio", "Me va muy bien, me siento muy bien en mis clases; no puedo esperar para ir a la siguiente."], ["Beatriz", "Jajaja, así me sentía yo al principio, me alegra que te guste. Bueno Antonio ya debo dejarte, voy a clases."], ["Antonio", "Ok. Que tengas un buen día."]], "en_lines": [["Antonio", "Hello, how are you?"], ["Beatriz", "Very well, and you?"], ["Antonio", "Fine."], ["Beatriz", "I am glad to hear that."], ["Antonio", "How long have you been studying at this university for?"], ["Beatriz", "Two years already, and you?"], ["Antonio", "This is my first year."], ["Beatriz", "What do you think about this university?"], ["Antonio", "I think it’s very good."], ["Beatriz", "How are your classes going and what are your teachers like?"], ["Antonio", "I am doing pretty okay, I feel very good in classes; I can’t wait to go to the next."], ["Beatriz", "Hahaha, that’s how I felt at the beginning, I’m glad that you like it. Well Antonio, I have to leave to go to classes."], ["Antonio", "Okay. Have a nice day."]]}, {"num": 78, "es": "Encontrando el aula de clases", "en": "Finding the Classroom", "es_lines": [["Carmen", "Hola, disculpa, ¿podrías ayudarme?"], ["Alejandro", "Seguro, ¿qué necesitas?"], ["Carmen", "No sé dónde está mi salón de clases."], ["Alejandro", "Primero, ¿qué departamento estas buscando?"], ["Carmen", "El edificio de ciencias sociales."], ["Alejandro", "Oh ok, ya sé dónde está."], ["Carmen", "¿Puedes indicarme en dónde está? Ando un poco perdida ya que es mi primer día de clases."], ["Alejandro", "Si claro, y, ¿qué salón estas buscando?"], ["Carmen", "El salón veintiuno de ciencias sociales."], ["Alejandro", "Tengo clases cerca de ese salón en este momento."], ["Carmen", "¿Puedes mostrarme dónde está?"], ["Alejandro", "Claro, ven sígueme que ya es hora de entrar a clases."]], "en_lines": [["Carmen", "Hello, excuse me, could you help me?"], ["Alejandro", "Sure, what do you need?"], ["Carmen", "I don’t know where my classroom is."], ["Alejandro", "First, what department are you looking for?"], ["Carmen", "The Social Science building."], ["Alejandro", "Oh ok, I know where it is."], ["Carmen", "Could you indicate me where it is? I am a little lost because it’s my first day of class."], ["Alejandro", "Yeah sure, what classroom are you looking for?"], ["Carmen", "Social Science classroom twenty-one."], ["Alejandro", "Right now I have classes near to that classroom."], ["Carmen", "Could you show me where it is?"], ["Alejandro", "Of course, come and follow me because it’s already time to enter class."]]}, {"num": 79, "es": "Planes nocturnos", "en": "Night Plans", "es_lines": [["Valeria", "¿Irás a la fiesta esta noche?"], ["Matthias", "Estaba pensando en ir, ¿tú irás también?"], ["Valeria", "Sí, escuché que va a estar muy buena y divertida."], ["Matthias", "¿De verdad? Bueno, ¿a qué hora comienza?"], ["Valeria", "Comienza a las 9:00 pm. Pienso que deberías ir, y así te diviertes un poco."], ["Matthias", "Bueno, ¿quién más va a ir?"], ["Valeria", "Todos los de la escuela."], ["Matthias", "Valeria, ¿cómo sabes que va a estar buena la fiesta?"], ["Valeria", "La fiesta tendrá mucha comida, un dj, y estaremos todos compartiendo hasta muy tarde."], ["Matthias", "Genial, ahora sí suena muy bien. Creo que sí va a ser muy divertida esa fiesta de la que me hablas."], ["Valeria", "¿Te veo allá?"], ["Matthias", "Si claro, nos vemos allá."]], "en_lines": [["Valeria", "Are you going to tonight’s party?"], ["Matthias", "I was thinking about going, are you going as well?"], ["Valeria", "Yes, I heard it’s going to be very good and fun."], ["Matthias", "Really? Well, at what time does it begin?"], ["Valeria", "It starts at 9:00 pm. I think you should go so you have some fun."], ["Matthias", "Well, and who else is going?"], ["Valeria", "Everybody at school."], ["Matthias", "Valeria, how do you know it’s going to be a good party?"], ["Valeria", "The party is going to have a lot of food, a DJ and we are going to be partying till very late."], ["Matthias", "Great, now it sounds like it’s going to be good. I think the party is going to be really fun."], ["Valeria", "See you there?"], ["Matthias", "Yeah sure, see you there."]]}, {"num": 80, "es": "A la playa", "en": "To the Beach", "es_lines": [["Ignacio", "¿Te gustaría ir a la playa mañana?"], ["Carolina", "Claro, ¿a que playa iremos?"], ["Ignacio", "Yo quería ir a Ocumare de la Costa."], ["Carolina", "Me gusta Cata."], ["Ignacio", "Allá el agua es muy oscura y las olas son muy fuertes."], ["Carolina", "Me parecen mejores las playas del Parque Morrocoy."], ["Ignacio", "Morrocoy me parece estupendo; sus playas son tan limpias, de aguas cristalinas y muy hermosas."], ["Carolina", "Entonces, ¿vamos a Morrocoy?"], ["Ignacio", "Sí, me parece más apropiado, más seguro y placentero."], ["Carolina", "A qué hora partiremos a la playa?"], ["Ignacio", "Debemos irnos muy temprano en la mañana porque queda muy lejos."], ["Carolina", "¿Te parece apropiado si nos vamos a las 5:00 a.m.?"], ["Ignacio", "Me parece perfecto. Te llamo al despertar; no olvides el protector solar."]], "en_lines": [["Ignacio", "Would you like to go to the beach tomorrow?"], ["Carolina", "Sure, what beach are we going to?"], ["Ignacio", "I wanted to go to Ocumare de la Costa."], ["Carolina", "I like Cata."], ["Ignacio", "On Cata beach the water is very dark and the waves are too strong."], ["Carolina", "I think Parque Morrocoy’s beaches are better."], ["Ignacio", "Morrocoy looks great to me, its beaches are crystalline clear, clean, and very beautiful."], ["Carolina", "Then, shall we go to Morrocoy?"], ["Ignacio", "Yes, I think it’s more appropriate, safer and more pleasant."], ["Carolina", "At what time are we going to the beach?"], ["Ignacio", "We need to leave very early in the morning because it’s too far away."], ["Carolina", "Do you think it’s appropriate that we leave at 5:00 a.m.?"], ["Ignacio", "I think it’s perfect. I will call you when I wake up, don’t forget your sunscreen."]]}, {"num": 81, "es": "Buscando un puesto de estacionamiento", "en": "Looking for a Parking Spot", "es_lines": [["Richard", "Necesito conseguir un lugar donde estacionarme."], ["Andreina", "¿En el estacionamiento de arriba o en el subterráneo?"], ["Richard", "Me gustaría en el subterráneo, de esa forma protejo el carro del sol."], ["Andreina", "¿Por qué no te estacionas en el estacionamiento de la entrada?"], ["Richard", "¿Hay lugar ahí para estacionarme?"], ["Andreina", "Si claro, aún queda un lugar entre el carro azul y la camioneta blanca de allá."], ["Richard", "Está todo lleno. ¿Siempre es así?"], ["Andreina", "Sí, así es. Siempre este centro comercial esta lleno, pero después de las 4:00 p.m. ya se queda vacio."], ["Richard", "¿Cuánto tiempo demoraremos en buscar los que necesitas?"], ["Andreina", "Será rápido. En media hora regresamos a la casa."], ["Richard", "¿Estás segura?"], ["Andreina", "Muy segura. Vamos estaciona el auto y vamos adentro. El auto estará bien vigilado en ese lugar."]], "en_lines": [["Richard", "I need to find a place to park."], ["Andreina", "In the upper or underground parking lot?"], ["Richard", "I would like to park underground, that way I protect the car from the sun."], ["Andreina", "Why don’t you park at the front parking lot?"], ["Richard", "Is there a spot to park there?"], ["Andreina", "Yeah sure, there is a parking stall between the blue car and the white van over there."], ["Richard", "It’s all full. Is it always like that?"], ["Andreina", "Yes, it is. This mall is always full, but after 4:00 p.m. it remains empty."], ["Richard", "How long will we take to search for what you need?"], ["Andreina", "It’ll be quick. In half an hour we will return home."], ["Richard", "Are you sure?"], ["Andreina", "Very sure. Let’s park the car and get inside, the car will be well-watched in that place."]]}, {"num": 82, "es": "Viejos amigos", "en": "Old Friends", "es_lines": [["Anabel", "Hola, no te había visto desde hace mucho, ¿cómo estas?"], ["Jose Antonio", "Si, ha pasado mucho tiempo. Bueno estoy muy bien, ¿y tú?"], ["Anabel", "Muy bien, ¿cuánto tiempo ha pasado desde la última vez que nos vimos?"], ["Jose Antonio", "Creo que la última vez que nos vimos fue hace tres o cuatro años."], ["Anabel", "Wow… Y, ¿qué has estado haciendo en todo este tiempo?"], ["Jose", "Antonio: He estado estudiando para graduarme de la universidad y trabajando."], ["Anabel", "¿Qué estudias?"], ["Jose Antonio", "Estoy estudiando ingeniería industrial."], ["Anabel", "Supongo que debes de ser un buen estudiante ya que trabajas y estudias al mismo tiempo."], ["Jose Antonio", "Mi actual empleo me ayuda a practicar lo que estudio y así logro salir muy bien en mis estudios."], ["Anabel", "Que bueno oír eso. ¿Te gustaría que nos reuniéramos para salir como lo hacíamos antes y compartir con nuestros antiguos amigos?"], ["Jose Antonio", "Me parece buena idea."]], "en_lines": [["Anabel", "Hello, I haven’t seen you in a long time, how are you?"], ["Jose Antonio", "Yes, it’s been quite a while. I’m very well, and you?"], ["Anabel", "Very good, how long has it been since the last time we saw each other?"], ["Jose Antonio", "I think the last time we saw each other was about three or four years ago."], ["Anabel", "Wow… And what have you been doing all this time?"], ["Jose Antonio", "I have been studying to graduate at the university and working."], ["Anabel", "What are you studying?"], ["Jose Antonio", "I’m studying industrial engineering."], ["Anabel", "I suppose you must be a good student because you work and study at the same time."], ["Jose Antonio", "My current job helps me to practice what I study and that way I manage to turn out well in my studies."], ["Anabel", "It’s good to hear that. Would you like to meet like we used to before and hang out with our old friends?"], ["Jose Antonio", "It sounds like a good idea to me."]]}, {"num": 83, "es": "Conversación entre dos conocidos", "en": "Conversation Between Acquaintances", "es_lines": [["Sofia", "Hola, ¿cómo estas?"], ["Ernesto", "Bien. ¿Qué hay de ti, cómo te va?"], ["Sofia", "Estoy muy bien. Gracias por preguntar."], ["Ernesto", "No hay problema. Y, ¿como has estado?"], ["Sofia", "Bien, realmente. ¿Qué hay de ti?"], ["Ernesto", "He estado bien. Ahora mismo estoy en la escuela."], ["Sofia", "Ah que bien, ¿y a cuál escuela vas?"], ["Ernesto", "Voy a la escuela Republica de Mexico."], ["Sofia", "¿Y te gusta ir?"], ["Ernesto", "Sí, me gusta muchísimo, es muy grande y hermosa y mis amigos también estudian ahi."], ["Sofia", "Bueno, buena suerte en tu escuela. Cuídate mucho."], ["Ernesto", "Muchísimas gracias."]], "en_lines": [["Sofia", "Hello, how are you?"], ["Ernesto", "Fine. How about you? How are you doing?"], ["Sofia", "I am very well, thank you for asking."], ["Ernesto", "No problem. And how have you been?"], ["Sofia", "Really well. How about you?"], ["Ernesto", "I’ve been well. Right now I’m in school."], ["Sofia", "Ah, that’s good. And what school are you going to?"], ["Ernesto", "I am going to the “República de México” school."], ["Sofia", "And do you like it there?"], ["Ernesto", "Yes I like it a lot, it’s very big and beautiful and my friends study there too."], ["Sofia", "Well, good luck at your school. Take care a lot."], ["Ernesto", "Thank you very much."]]}, {"num": 84, "es": "Reuniones y fechas", "en": "Meetings and Dates", "es_lines": [["William", "Buenos días, ¿en qué puedo ayudarle?"], ["Gabriela", "Hola, yo tengo una reunión pautada con la señorita Adams."], ["William", "¿A qué hora es su reunión?"], ["Gabriela", "La reunión es a las 10 a.m., el 15 de febrero."], ["William", "Disculpe, pero yo tengo aquí que su reunión está pautada para el 20 de febrero a las 10 a.m."], ["Gabriela", "No, eso es imposible. El formulario debe estar equivocado."], ["William", "Mire usted aquí el formulario, señorita."], ["Gabriela", "Sí, tiene usted razón, la anterior persona que atendía ¿se encuentra aquí aun?"], ["William", "No, disculpe. Ella fue despedida."], ["Gabriela", "Si claro, comprendo, ¿y cómo puedo arreglar esto?"], ["William", "Lo que haré es llenar un nuevo formulario con una nueva fecha de reunión para que el gerente la pueda atender, y como la fecha que había pedido está disponible le programaré su reunión para ese día a las 10 a.m. ¿Qué le parece eso?"], ["Gabriela", "Sí, está bien, me parece perfecto."]], "en_lines": [["William", "Good day, how can I help you?"], ["Gabriela", "Hello. I have a scheduled meeting with Miss Adams."], ["William", "What time is your meeting?"], ["Gabriela", "The meeting is on February 15 at 10 a.m."], ["William", "Excuse me, but here I can see that your meeting is scheduled for February 20 at 10 a.m."], ["Gabriela", "No, that is impossible. The form must be wrong."], ["William", "Look at the form for yourself, ma’am."], ["Gabriela", "Yes, you are right, the last person who attended here, is she still here?"], ["William", "No, I am sorry. She was fired."], ["Gabriela", "Yes right, I understand, but how can I fix this?"], ["William", "What I’m going to do is that I will fill a new sheet with a new meeting date so the manager can see you, and since the date you requested is available I will schedule your meeting for that day at 10 a.m. What do you think about that?"], ["Gabriela", "Yes, alright, I think it’s perfect."]]}, {"num": 85, "es": "En el lobby del hotel", "en": "At the Hotel Lobby", "es_lines": [["Hector", "Hola, buenas noches, me gustaría alquilar una habitación."], ["Yeimy", "Buenas noches señor, ¿la quiere individual o matrimonial?"], ["Hector", "Matrimonial por favor, señorita."], ["Yeimy", "Bien, ¿qué tipo de habitación quiere usted? ¿Sencilla o VIP?"], ["Hector", "¿Cuáles son las diferencias entre habitaciones?"], ["Yeimy", "La sencilla no tiene nevera ni jacuzzi, mientras que la VIP cuenta con esas características y más."], ["Hector", "Ah, comprendo; entonces prefiero la VIP."], ["Yeimy", "¿Quiere usted un teléfono para realizar llamadas?"], ["Hector", "Sí, por favor."], ["Yeimy", "¿Cómo va a cancelar? ¿Cheque, tarjeta de débito o crédito?"], ["Hector", "Tarjeta de crédito. ¿En cuánto saldrán 4 noches?"], ["Yeimy", "La habitación VIP sale en cincuenta dólares por noche, así que serían doscientos dólares en total."], ["Hector", "Mmm, me encanta, está económico, ¿y tienen servicio de habitaciones? ¿Incluyendo agua e hielo?"], ["Yeimy", "Si, todos los servicios disponibles están indicados en la puerta de la habitación, así como las instrucciones para usar el interfono para comunicarse con el personal del hotel."], ["Hector", "Está bien, muchas gracias."], ["Yeimy", "Esperamos que disfrute su estadía."]], "en_lines": [["Hector", "Hello good evening, I want a room."], ["Yeimy", "Good evening sir, do you want it single or double?"], ["Hector", "Double please, ma’am."], ["Yeimy", "Well, what kind of room do you want? Simple or VIP?"], ["Hector", "What are the differences between those bedrooms?"], ["Yeimy", "The simple one doesn’t have a fridge nor Jacuzzi, while the VIP has these features and more."], ["Hector", "Ah, I understand; then I prefer the VIP one."], ["Yeimy", "Do you need a phone for calls?"], ["Hector", "Yes, please."], ["Yeimy", "How are you going to pay? Check, debit or credit card?"], ["Hector", "Credit card. How much for 4 nights?"], ["Yeimy", "The VIP bedroom costs fifty dollars per night, so it would be two hundred dollars in total."], ["Hector", "Hmm, I love it, it’s cheap. And do you have room service? Including ice and water?"], ["Yeimy", "Yes, all the services available are indicated at the bedroom’s door, as well as how to use the phone to communicate with the hotel."], ["Hector", "Okay, thanks a lot."], ["Yeimy", "We hope you enjoy your stay."]]}, {"num": 86, "es": "Una casa ideal", "en": "An Ideal House", "es_lines": [["Luis", "Hola Yesica, quiero tomar ideas para una casa, y necesito que me ayudes ¿Cómo sería la casa ideal para ti?"], ["Yesica", "Mmm, ¿por dónde empiezo? Bueno primero que nada, tiene que estar en un buen sitio, no sé, un conjunto residencial por ejemplo. Me gusta mucho la ciudad y no me agrada vivir en el campo."], ["Luis", "Es verdad, eres una chica de ciudad. Dame más detalles que estoy anotando lo que dices."], ["Yesica", "Mmm, que sea una casa de dos pisos, que tenga piscina y un jardín pequeño y modesto."], ["Luis", "¿Y qué sobre el interior de la casa?"], ["Yesica", "Me gustaría que en la parte de abajo hubiera tres cuartos con su baño propio cada uno, una cocina grande empotrada y un comedor muy bonito."], ["Luis", "¿Y sobre la parte de arriba?"], ["Yesica", "Mmm, sería lo mismo, sólo que con una terraza en vez de cocina, ¿me entiendes?"], ["Luis", "¿Por qué una terraza?"], ["Yesica", "Para hacer las reuniones y fiestas privadas."], ["Luis", "Oh, es una excelente idea."], ["Yesica", "Espero te haya servido de mucho."], ["Luis", "Si, ¡ya tengo buenas ideas para construir mi casa ideal! Aun así, yo pienso en un jardín mucho más grande. Me gustaría tener perros en mi casa."], ["Yesica", "¿Perros? ¿Más de uno?"]], "en_lines": [["Luis", "Hello Yesica, I want to take some ideas for a house, and I need you to help me. How would an ideal house be for you?"], ["Yesica", "Mmm, where do I start? Well first of all, it has to be in a nice place, I don’t know, a residential compound for example. I like the city a lot and I don’t enjoy living in the country."], ["Luis", "It’s true, you are a city girl. Give me more details, I’m taking note of what you are saying."], ["Yesica", "Mmm, it has to be a two-storey house, with a pool and a small and modest garden."], ["Luis", "And what about the house interior?"], ["Yesica", "I would like there to be a ground floor with three bedrooms with a bathroom each, a big embedded kitchen and a very pretty dining room."], ["Luis", "And what about the upper part?"], ["Yesica", "Mmm, it would be the same, but with a balcony instead of a kitchen, do you understand?"], ["Luis", "Why a balcony?"], ["Yesica", "To have meetings and private parties."], ["Luis", "Oh, that’s an excellent idea."], ["Yesica", "I hope that I’ve helped you."], ["Luis", "Yes, I have good ideas to build my ideal house! Even so, I’m thinking of a bigger garden. I’d like to have dogs in my house."], ["Yesica", "Dogs? More than one?"]]}, {"num": 87, "es": "Rentando un auto", "en": "Renting a Car", "es_lines": [["Rebeca", "Buenas tardes señor, me gustaría rentar un auto, por favor."], ["Eduardo", "Por supuesto, ¿por cuánto tiempo?"], ["Rebeca", "Por tres días."], ["Eduardo", "Correcto, ¿A dónde va a ir con el auto?"], ["Rebeca", "Me gustaría ir a pasear y conocer nuevos lugares. ¿Qué tan lejos puedo llevarlo?"], ["Eduardo", "Nuestros autos están equipados con rastreo satelital, y tenemos varias sucursales en todos los países de Europa, así que usted puede rentarlo aquí y entregarlo en cualquiera de nuestras sucursales."], ["Rebeca", "Perfecto. Por cierto, ¿cómo puedo encontrar cualquier de estas sucursales? Y, ¿cómo puedo solicitar una extensión del tiempo en caso de que lo necesite por unos días más?"], ["Eduardo", "Todos nuestros autos cuentan con GPS y usted puede encontrar la sucursal más cercana muy fácilmente. Y para extender su tiempo, sólo tiene que acercarse a cualquiera de estas tiendas y hacer una petición de extensión."], ["Rebeca", "Muy bien. ¿Puedo ver los autos disponibles?"], ["Eduardo", "Sí, aquí está el catalogo."], ["Rebeca", "Éste me gusta bastante. Creo que me lo llevaré."], ["Eduardo", "Ok, ¿puedo ver su licencia de conducir?"], ["Rebeca", "Yo tengo una licencia de manejo internacional."], ["Eduardo", "Esa funcionará. ¿Cómo desea pagar usted?"], ["Rebeca", "Con una tarjeta American Express, por favor."], ["Eduardo", "Ahora mismo le traigo su coche."], ["Rebeca", "Muchas gracias."], ["Eduardo", "Que lo disfrute."]], "en_lines": [["Rebeca", "Good afternoon sir, I would like to rent a car, please."], ["Eduardo", "Yes, of course. For how long?"], ["Rebeca", "About three days."], ["Eduardo", "Correct, where are you going with the car?"], ["Rebeca", "I would like to take a stroll and get to know new places. How far can I take it?"], ["Eduardo", "Our vehicles are equipped with satellite tracking and we have several branches across all Europe countries, so you can rent it here and give it back in any of our branches."], ["Rebeca", "Perfect. By the way, how can I find these branches? And, how can I request for an extension of time in case I need it for a few more days?"], ["Eduardo", "All our vehicles have GPS, so you can find the nearest branch very easily. And to extend your time you just need to reach to any of these shops and make an extension request."], ["Rebeca", "Very well. Can I see the available cars?"], ["Eduardo", "Yes, here is the catalogue."], ["Rebeca", "I like this one a lot. I think I will take it."], ["Eduardo", "Ok, can I see your driver license?"], ["Rebeca", "I have an international driver license."], ["Eduardo", "That will work. How do you wish to pay?"], ["Rebeca", "With an American Express card, please."], ["Eduardo", "I will bring your car right now."], ["Rebeca", "Thank you very much."], ["Eduardo", "Enjoy it."]]}, {"num": 88, "es": "Computadoras y teléfonos inteligentes", "en": "Computers and Smartphones", "es_lines": [["Valentina", "Hola Jesús, ¿has visto la publicidad del último teléfono inteligente que salió hace unos días? ¡Es increíble!"], ["Jesús", "Si la vi, creo que es algo genial."], ["Valentina", "¡Mi tía compró uno y puede hacer muchas cosas!"], ["Jesús", "¿No crees que sea algo increíble que un celular, algo tan pequeño, pueda hacer tantas cosas?"], ["Valentina", "Sí, es verdad. Es posible que en algunos años los teléfonos inteligentes reemplacen a las computadoras."], ["Jesús", "No lo creo. Hay cosas que las computadoras pueden hacer que los teléfonos inteligentes jamás podrán."], ["Valentina", "¿Cómo qué?"], ["Jesús", "Trabajar en documentos, jugar algunos tipos de juegos. Hacer eso en un dispositivo tan pequeño sería muy incómodo."], ["Valentina", "Tienes un punto. Sin embargo, hay muchos juegos disponibles para los dispositivos móviles."], ["Jesús", "Lo sé. Yo personalmente juego varios, pero hay otros donde necesitas una pantalla grande, un ratón y un teclado para jugarlos y el teléfono no puede reemplazar eso."], ["Valentina", "Ahora que lo pienso, las computadoras siempre están siendo actualizadas. Cada semana anuncian piezas más poderosas, y tienes libertad total para instalar lo que quieras. ¡Ni siquiera las laptops pueden competir contra eso!"], ["Jesús", "Hace unas semanas atrás, mi papá armó una computadora. Es increíble, te lo digo."], ["Valentina", "¡Guao! no sabía que tu papá sabía de computadoras."], ["Jesús", "Yo tampoco, pero parece que estuvo investigando por semanas para que se ajustara de acuerdo a sus necesidades."], ["Valentina", "Tienes que invitarme a tu casa y dejarme probarla."], ["Jesús", "Jajaja, mi papá es muy cuidadoso con ese aparato y no deja que nadie la use, pero me prometió que haría una para mí. Cuando esté lista la probaremos juntos."], ["Valentina", "Es una promesa. Por cierto, ¿Cuánto costó la computadora?"], ["Jesús", "No me acuerdo, pero creo que cuesta varios miles de dólares."], ["Valentina", "¿Qué? Creo que por ahora prefiero los teléfonos inteligentes."]], "en_lines": [["Valentina", "Hello Jesus, have you seen the last smartphone commercial that came out a few days ago? It’s incredible!"], ["Jesus", "Yes, I saw it. I think it’s something cool."], ["Valentina", "My aunt bought one and it can do a lot of things!"], ["Jesus", "Don’t you think it’s incredible that a cellphone, something so small, can do so many things?"], ["Valentina", "Yes, it’s true. It’s possible that in a few years smartphones will replace computers."], ["Jesus", "I don’t think so. There things that computers can do that smartphones will never do."], ["Valentina", "Like what?"], ["Jesus", "Working with documents, playing some kind of games. Doing them on a device that small would be very awkward."], ["Valentina", "You have a point. However, there are many games available for mobile devices."], ["Jesus", "I know. I personally play some, but there are others where you need a big screen, a mouse and a keyboard to play them and a phone can’t replace that."], ["Valentina", "Now that I think about it, computers are always being updated. Every week, more powerful pieces are announced, and you have total freedom to install whatever you want. Not even laptops can compete against that!"], ["Jesus", "A few weeks ago, my dad built a computer. It’s incredible, I tell you."], ["Valentina", "Wow, I didn’t know that your dad knew about computers."], ["Jesus", "Neither did I, but it seems that he had been researching for weeks to fit to his needs."], ["Valentina", "You have to invite me to your house and let me try it."], ["Jesus", "Hahaha, my dad is very careful with that machine and doesn’t let anyone use it, but he promised me that he would make one for me. When it’s ready, we will try it together."], ["Valentina", "It’s a promise. By the way, how much did the computer cost?"], ["Jesus", "I don’t remember, but I think it cost several thousand dollars."], ["Valentina", "What? I think I prefer smartphones for the time being."]]}, {"num": 89, "es": "Un partido de fútbol", "en": "A Football Match", "es_lines": [["Gonzalo", "Antonieta, sintoniza el canal de deporte ya, ¡está comenzando el partido de fútbol!"], ["Antonieta", "¿Sí? ¿Cuál es el canal?"], ["Gonzalo", "El seiscientos cuatro. ¡Va a estar genial! Es el gran encuentro entre los rivales más grandes de la ciudad."], ["Antonieta", "Aquí está. ¿A quién le vas? ¿A los azules, o los rojos?"], ["Gonzalo", "A los rojos, por supuesto. Son mi equipo de toda la vida."], ["Antonieta", "Y eso, ¿por qué? Por sus colores, ¿o qué?"], ["Gonzalo", "No, Antonieta, por favor. Tienen jugadores muy buenos, y una historia muy ilustre que me hace amarlos más."], ["Antonieta", "Pues entonces yo voy a apoyar a los azules."], ["Gonzalo", "¡Hey! ¿Y eso por qué?"], ["Antonieta", "Para llevarte la contraria y para darle emoción a este partido. Si ambos apoyamos a los rojos será muy aburrido mirarlo."], ["Gonzalo", "Está bien. Ya verás que mi equipo va a ganarle al tuyo."], ["Antonieta", "Pues yo no creo, es más, voy a reírme de ti cuando ganen los azules."], ["Gonzalo", "¡Oh, vamos! ¿Viste eso? ¡Anotó el equipo azul, que rabia!"], ["Antonieta", "Jajaja, te lo dije. Van a perder los rojos. Me reíre mucho, oh sí."], ["Gonzalo", "¡Vamos equipo! Oh, casi anotan. Ya verás, no perderán los rojos. Tenemos una plantilla muy fuerte esta temporada."], ["Antonieta", "¡Vamos, metan otro, azules! Oh, penal para los rojos. Que mal, parece que los azules van a perder la ventaja."], ["Gonzalo", "Nuestro delantero nunca falla los penales. Vamos… ¡Gooooool! ¡Te lo dije, no vamos a perder!"], ["Antonieta", "Sigue hablando, ya no me interesa este partido. En realidad no quería ver fútbol, así que hablamos luego. Hablamos cuando termine tu preciado partido de fútbol."], ["Gonzalo", "Eres una muy mala perdedora, Antonieta, no te vayas. Si quieres vemos una película cuando termine el partido."], ["Antonieta", "Sí, pero la escojo yo. Algo de romance que me gusta más que el deporte."], ["Gonzalo", "De acuerdo, lo que tú digas."]], "en_lines": [["Gonzalo", "Antonieta, tune in to the sports channel now, the football match is about to start!"], ["Antonieta", "Yeah? Which channel is it?"], ["Gonzalo", "Channel six hundred and four. It’s going to be great! It’s the great encounter between the two biggest city rivals."], ["Antonieta", "Here it is. Who do you support? The blue guys or the red ones?"], ["Gonzalo", "The red team, of course. They’ve been my favorite team for all of my life."], ["Antonieta", "Why is that? Is it because of the color of their kit, or what?"], ["Gonzalo", "No, Antonieta, please. It’s because they have really good football players, and a star-studded history that makes me love them even more."], ["Antonieta", "Well, I’m going to support the blue team, then."], ["Gonzalo", "Hey! Why are you gonna do that?"], ["Antonieta", "So I can go against you and to make the game more interesting and exciting. If we both decide to support the red team, it’s going to be quite a boring afternoon."], ["Gonzalo", "Ok, I guess. You’ll see that my team is going to beat yours."], ["Antonieta", "Well I don’t think so, heck, I’m certain I’m going to be laughing when the blue team wins."], ["Gonzalo", "Oh, come on! Did you see that? The blue team scored, what a shame!"], ["Antonieta", "Hahaha, I told you. The reds are going to lose. I’m going to laugh so much, oh yeah."], ["Gonzalo", "Come on, team! Oh, they almost scored. You’ll see, the reds aren’t going to lose. We have a very strong lineup this season."], ["Antonieta", "Come on, score another one, blues! Oh, penalty for the reds. What a bummer, it looks like the blues are going to lose their advantage."], ["Gonzalo", "Our striker never misses a penalty. Come on… Gooooooaaal! I told you, we’re not losing!"], ["Antonieta", "Whatever, keep talking, I no longer care about the match. In fact, I didn’t even want to watch football, so see you later. We can talk when your precious match is over."], ["Gonzalo", "You’re a really sore loser, Antonieta, don’t go. If you want, we can watch a movie once the match is done."], ["Antonieta", "Yeah, but I choose which one. Something with romance, which I enjoy more than sports."], ["Gonzalo", "Okay, whatever you say."]]}, {"num": 90, "es": "Grabando un video", "en": "Filming a Video", "es_lines": [["Pedro", "¿Oye, Daniela, sabes cómo grabar un video para subirlo a mis redes sociales? Quiero explicarles a mis amigos cómo preparar un delicioso asado."], ["Daniela", "¿Sí? Suena genial. ¿Es para tu canal de videos de cocina?"], ["Pedro", "Sí, amiga. Ya tengo más de quinientos seguidores, está creciendo mucho y necesito agregar más contenido para ellos."], ["Daniela", "¡Que éxito! Bueno, trae la cámara. Te voy a explicar bien."], ["Pedro", "A ver, ¿dónde la dejé? Hmm… ah ya, bueno aquí está la cámara, ya la prendí."], ["Daniela", "Perfecto. Vamos a posicionarla en la dirección correcta. ¿Dónde vas a preparar el asado? ¿Ahí en esa mesa?"], ["Pedro", "No, Dani. Sígueme a la cocina. Ok, aquí mismo podemos poner la cámara. ¿Qué más debo hacer?"], ["Daniela", "Bueno, puedes ajustar el temporizador para que empiece a grabar unos segundos luego de que aprietes el botón, y así no te verán alejarte de la cámara. Hay poca luz acá, ¿no puedes iluminar mejor?"], ["Pedro", "Déjame prender la lámpara. ¿Qué tal si me grabas tú?"], ["Daniela", "Puede ser mejor, así me aseguro de que vean todo el proceso detalladamente. ¿Estás listo para empezar en cinco minutos?"], ["Pedro", "Pienso que sí. Ok, ayúdame a buscar los ingredientes, están en la nevera."], ["Daniela", "Listo. Ahora sólo faltan los utensilios de la cocina. ¿En esta lista escribiste cuáles son, cierto?"], ["Pedro", "Exacto. A ver, cuchillo de carne, sartén, tabla para picar…"], ["Daniela", "¡Y una cuchara para los condimentos! Perfecto, estamos preparados, ahora sólo falta que te acomodes la vestimenta y el cabello. Ve a peinarte."], ["Pedro", "De acuerdo. Me pondré un delantal y me peinaré. También me pondré mi gorro de chef, no puede faltar."], ["Daniela", "Ok, ahora sí. ¡Te ves realmente genial! ¿Listo?"], ["Pedro", "¡Listo!"], ["Daniela", "Perfecto; ¡luces, cámara, acción!"], ["Pedro", "Buen día, queridos amigos, el día de hoy les enseñaré cómo preparar un delicioso asado…"]], "en_lines": [["Pedro", "Hey, Daniela, do you know how to film a video so that I can upload something to my social media? I want to show my friends how to cook a delicious roast."], ["Daniela", "Yeah? It sounds awesome. Is it for your cooking video channel?"], ["Pedro", "Yes, my friend. I already have over one thousand followers and it’s growing quickly, I need to add some content for them."], ["Daniela", "What a success! Well, go and bring the camera. I’m going to explain step by step."], ["Pedro", "Let’s see, where did I leave it? Hmm… oh right, the camera’s right here, and I’ve turned it on."], ["Daniela", "Perfect. Let’s set it down in the right place. Where are you going to cook the roast? Right there on that table?"], ["Pedro", "No, Dani. Follow me to the kitchen. Ok, we can put the camera right here. What else must I do?"], ["Daniela", "Well, you can adjust the timer so that it begins filming a few seconds after you press a button, that way nobody will see you walking away from the camera. There’s little light here, can’t you illuminate the place a bit?"], ["Pedro", "Let me turn on the light. Hey, what if you film me, instead?"], ["Daniela", "That could be better, that way we can ensure the entire process is filmed in detail. Are you ready to start in the next five minutes?"], ["Pedro", "I certainly think so. Okay, help me find the ingredients, they’re in the fridge."], ["Daniela", "Ready. Now we just need the kitchen utensils to be used. You wrote all of them on this list, didn’t you?"], ["Pedro", "Exactly. Let’s see, meat knife, pan, chopping block…"], ["Daniela", "And a spoon for the condiments! Perfect, we’re prepared, now you just need to fix your clothes and your hair. Go and comb it."], ["Pedro", "Alright. I’ll grab my apron and comb my hair. I’ll also put on my chef hat, it must be present."], ["Daniela", "Ok, we’re all set to go. You look really great! Ready?"], ["Pedro", "Ready!"], ["Daniela", "Perfect; lights, camera, action!"], ["Pedro", "Good day, my lovely friends, today I’m going to teach you how to make a delicious roast…"]]}, {"num": 91, "es": "¡No puedo encontrarlo!", "en": "I can’t find it!", "es_lines": [["Mery", "Edwin, dime que has visto mi cartera; ¡no la logro encontrar por ninguna parte!"], ["Edwin", "¿Yo? ¿Ver tu cartera? Ni idea. A veces no buscas bien, así que no entres en pánico aún."], ["Mery", "¡Ya tengo dos horas buscándola! Necesito salir, ¡pero ahí tengo mis llaves del carro, mi dinero y mis papeles! ¡Esto es un desastre, no puedo creer que la perdí!"], ["Edwin", "Respira, Mery. Vamos a pensar en todos los lugares donde has estado hoy. Puedes haberlo dejado en el lugar menos esperado."], ["Mery", "Hoy salí con ella al abasto cercano… puede ser que la dejé ahí. ¡Que idiota soy! De verdad perdí todo, y ahora será todo un problema recuperarlo. Puede ser que jamás vuelva a ver esas cosas…"], ["Edwin", "Sí las verás. No te sientas tan mal, yo sé que están acá. A ver, vamos a la cocina. Busquemos. ¿Ya revisaste bajo la mesa?"], ["Mery", "Mmm… nada."], ["Edwin", "¿Qué tal por el área de la cocina y el microondas?"], ["Mery", "No he buscado ahí, deja ver. No, nada. Mejor buscamos arriba en la habitación."], ["Edwin", "Ok. Mira dentro del closet. ¿Está ahí?"], ["Mery", "No, qué va. No está aquí. Tampoco está en el baño, acabo de buscar allí."], ["Edwin", "A ver, estoy viendo debajo de la cama y tampoco está. ¿Dónde más estuviste hoy?"], ["Mery", "Estuve regando las plantas afuera, podemos salir a ver."], ["Edwin", "Mmm, nada. No la veo por ninguna parte. Empiezo a preocuparme también, para ser sincero."], ["Mery", "Ya era hora que entendieras mi problema. Voy a volverme loca con esto. Es lo peor que me ha pasado en mucho tiempo."], ["Edwin", "Ya va, ¿qué es eso que veo ahí encima del carro?"], ["Mery", "¿De qué hablas, pero sí…? ¡¿Qué?! ¡Es mi cartera! ¿Cómo pude dejarla ahí? Y nadie la vio, porque ya se la hubiesen robado."], ["Edwin", "¿Ves? Todo se resolvió. Nunca entres en pánico por perder algo, ¡sólo piensa y recuerda!"]], "en_lines": [["Mery", "Edwin, please tell me you’ve seen my bag: I can’t seem to find it anywhere!"], ["Edwin", "Me? See your bag? No idea. Sometimes you don’t know where to look, so don’t go into panic mode yet."], ["Mery", "I’ve been looking for it for two hours! I need to go out, but my car keys, money and papers are in there! This is a disaster; I can’t believe I lost it!"], ["Edwin", "Breathe, Mery. Let’s start thinking of all the places you’ve been today. It could be in the place you least imagined."], ["Mery", "Today I went out with it to the local grocery store… I must have left it there. What an idiot I am! I truly lost everything, and now it will be an issue to recover it. I may never see those things again…"], ["Edwin", "Yes you will. Don’t beat yourself up over it, I know it’s here. Let’s see, let’s go to the kitchen. Search with me. Did you check under the table?"], ["Mery", "Mmm… nothing."], ["Edwin", "What about near the cooker and microwave?"], ["Mery", "I haven’t checked there, let me see. Nope, nothing. We should just go up to the bedroom to look."], ["Edwin", "Ok. Look inside the closet. Is it there?"], ["Mery", "No, no luck. It isn’t here. It isn’t in the bathroom, either, I’ve just looked there."], ["Edwin", "Let’s see, I’m taking a look under the bed and it’s not here either. Where else did you go today?"], ["Mery", "I was watering the plants outside; we could always go out and look."], ["Edwin", "Mmm, nothing. I can’t see it anywhere. I’m starting to worry too, to be honest."], ["Mery", "About time you understood my problem here. I’m going nuts with this. It’s the worst thing that’s happened to me in a long time."], ["Edwin", "Wait a sec, what is that I’m seeing on top of the car?"], ["Mery", "What are you talking about, if I…? What?! It’s my bag! How could I just leave it there? And nobody’s seen it, either, because they would have stolen it by now."], ["Edwin", "See, everything’s been solved. Never go into panic because you’ve lost something, just think and remember!"]]}, {"num": 92, "es": "¡Auxilio!", "en": "Help!", "es_lines": [["Gustavo", "Mmm, Patricia, este programa está muy interesante. Cuando termine, creo que deberíamos ir a la cocina a ver qué tal la cena."], ["Patricia", "Sí, ¿como cuánto tiempo tiene cocinándose?"], ["Gustavo", "Bueno, lo metí a las 8:00, y creo que ya son las… ¡¿9:30?! ¡Oh no, se nos pasó el tiempo!"], ["Patricia", "¡Vamos, creo que veo humo saliendo de la cocina!"], ["Gustavo", "Oh dios, no puede ser, ¡se está incendiando la cocina! ¡Ayúdame, Patricia!"], ["Patricia", "¡Que horrible, nuestra preciosa cocina! ¡Buscaré el extinguidor!"], ["Gustavo", "¡Buena idea! Llamaré a emergencias. Hola, 911, tenemos un incendio en nuestra cocina. Sí, vengan rápido, estamos en la Calle Azulejo, Sector 4, Edificio Los Pintos."], ["Patricia", "Aquí está el extinguidor, ¿ya vienen los bomberos a ayudarnos?"], ["Gustavo", "Sí, agáchate Patricia, hay mucho humo. Aff, no, acabé el extinguidor y el incendio no ha parado. Vamos a tener que salir."], ["Patricia", "¡Auxilio! ¡Auxilio! ¡Se está quemando nuestro apartamento!"], ["Gustavo", "No entres en pánico, creo que podemos salir sin problemas. Oye, ya se escuchan los gritos afuera. Por nuestra culpa el humo se está extendiendo por todo el edificio…"], ["Patricia", "Vamos, ya escucho las sirenas de los bomberos. Puede que lleguen a tiempo para salvar nuestro apartamento. Vayamos a un lugar más seguro."], ["Gustavo", "Debimos haber sido más cuidadosos, esto nos va a costar muy caro. Seguramente vamos a tener problemas con los vecinos."], ["Patricia", "Sí, pero lo que importa es que seguimos con vida. Jamás podemos volver a descuidar la cocina cuando estemos preparando comida, Gustavo."], ["Gustavo", "Así mismo es, no volveré a dejar de vigilar la comida mientras se cocine. Esta tragedia me hizo aprender esa lección de la peor manera. Además, ahora vamos a tener que pintar y comprar todo lo que se haya quemado. Creo que fue una forma de enseñarnos a tener cuidado."], ["Patricia", "Sí. Que bueno que estamos a salvo, Gustavo. Ahora esperemos que los bomberos acaben con las llamas."]], "en_lines": [["Gustavo", "Mmm, Patricia, this program is very interesting. When it’s done, we should take a look at the kitchen so we can see if our dinner is done."], ["Patricia", "Yeah, sure. How long has it been cooking?"], ["Gustavo", "Well, I started cooking it at 8:00, and it’s still… 9:30?! Oh no, we totally lost track of time!"], ["Patricia", "Come on, I can see smoke coming out of the kitchen!"], ["Gustavo", "Oh god, it cannot be, the kitchen is on fire! Help me, Patricia!"], ["Patricia", "Oh, it’s horrible, our beautiful kitchen! I’ll go for the fire extinguisher!"], ["Gustavo", "Good idea! I’ll call the emergency line. Hello, 911, we have a fire in our kitchen. Yes, come quickly, we’re at Azulejo Street, Sector 4, Los Pintos Building."], ["Patricia", "Here’s the extinguisher, are the firemen coming to help us yet?"], ["Gustavo", "Yes, crouch Patricia, there’s a lot of smoke. Oh, no, I’ve used up all of the extinguisher and the fire’s still raging. We’re going to have to leave."], ["Patricia", "Help! Help! Our apartment is burning down!"], ["Gustavo", "Don’t go into a panic, I think we can make it out without any problems. Hey, I can hear screams outside. Because of our mistake, the smoke is spreading throughout the entire building…"], ["Patricia", "Come, I can already hear the sirens from the firemen below. Maybe they’ll arrive in time to save our apartment from the worst. Let’s go somewhere safer."], ["Gustavo", "We should have been more careful, now this will cost us dearly. I’m sure we’re going to have trouble with our neighbors."], ["Patricia", "Yeah, but all that matters is that we’re alive. We can never leave our kitchen unattended again while cooking, Gustavo."], ["Gustavo", "Yeah, that’s true; I’ll never walk away from a meal being cooked again. This tragedy made me learn that lesson in the worst posible way. Furthermore, now we’re going to have to paint and replace everything that got burned. I think it was a way of telling us to be more careful."], ["Patricia", "Yep. I’m so glad we’re safe now, Gustavo. Let’s just leave it to the firemen to do their job now."]]}, {"num": 93, "es": "¿Quieres bailar conmigo?", "en": "Want to dance with me?", "es_lines": [["Francisco", "Hola, señorita; estuve viendo que estás sola en esta discoteca tan concurrida, y no te he visto bailar con nadie. ¿Te importa si me siento contigo?"], ["Grace", "Hola. No hay problema, aunque sólo estoy disfrutando de la música."], ["Francisco", "Excelente. Mi nombre es Francisco, mucho gusto."], ["Grace", "Grace, un placer."], ["Francisco", "Elegante nombre. ¿A qué te dedicas, Grace?"], ["Grace", "Soy enfermera, pero no estoy de turno. ¿Y tú?"], ["Francisco", "Soy ingeniero de sistemas; estoy de paso por la zona. Quería ver qué tal era la vida nocturna en esta ciudad."], ["Grace", "Genial, de hecho es muy buena. Esta discoteca es sólo una de tantas en la zona. Deberías ir a Blue Sky, queda cerca de aquí."], ["Francisco", "Si me la recomiendas, deberías venir conmigo a disfrutar de ella. De hecho, estás invitada enfermera Grace. Deja pagar tu cuenta."], ["Grace", "No tienes por qué."], ["Francisco", "Insisto. Aquí tienes, bartender. Ahora, ¿nos vamos, Grace?"], ["Grace", "De acuerdo. Oh, estacionaste tu carro cerca. ¿Sabes dónde queda el sitio que te digo?"], ["Francisco", "Ni idea; vas a tener que guiarme hasta allá."], ["Grace", "De acuerdo, no hay problema. Sigue por esta misma avenida, y cuando hayas alcanzado el semáforo, cruza a la derecha."], ["Francisco", "¿Ah, por acá? Oh, ya lo veo. Bueno, ya estamos acá en Blue Sky. Se ve que vienen bastantes personas los fines de semana. ¿Entramos?"], ["Grace", "Sí, este sitio es nuevo y a la gente le encanta. Es casi exclusivamente para bailar y pasarla bien. Yo no había podido venir porque mi horario no me lo permite."], ["Francisco", "Entiendo, la vida de una enfermera es muy sacrificada; de hecho me sorprende que estés aquí divirtiéndote esta noche y no descansando. A propósito, ¿quieres bailar conmigo, Grace?"], ["Grace", "Mmm… ¿por qué no? ¡Vamos!"], ["Francisco", "¡Genial!"]], "en_lines": [["Francisco", "Hello, Miss; I noticed that you’re sitting here all alone in such a busy club, and you haven’t danced with anybody. Would you mind if I sit with you?"], ["Grace", "Hello. There isn’t any problem with that, though I’m just enjoying the music."], ["Francisco", "Excellent. My name is Francisco, pleased to meet you."], ["Grace", "Grace, a pleasure."], ["Francisco", "Elegant name. So what do you do for a living, Grace?"], ["Grace", "I’m a nurse, but I’m currently off my shift. What about you?"], ["Francisco", "I’m a systems engineer; I’m passing through this area. I wanted to check out what this city’s night life is like."], ["Grace", "Great, actually it’s very good. This club is just one of many in this part of the city. You should go to Blue Sky, it’s nearby."], ["Francisco", "If you recommend it, you should actually come with me to enjoy it too. In fact, you’re invited, Nurse Grace. Let me pay your bill."], ["Grace", "You have no reason to do that."], ["Francisco", "I insist. Here you go, bartender. Now, shall we leave, Grace?"], ["Grace", "Fine. Oh, you parked your car nearby. Do you know where the place I mentioned is?"], ["Francisco", "No idea; you’re going to have to guide me there."], ["Grace", "Sure, no problem with that. Continue along this same street, and when you reach the traffic lights, turn right."], ["Francisco", "Oh, this way? Ah, I see it now. Well, looks like we’re here at Blue Sky. It definitely seems like many people come on weekends. Wanna go in?"], ["Grace", "Yeah, this place is new and people love it. It’s almost exclusively made for dancing and having an awesome time. I hadn’t been able to come because my timetable doesn’t allow me the chance to go out."], ["Francisco", "I get it; the life of a nurse is one of sacrifice. I don’t even understand how you’re out here enjoying yourself and not having a well-deserved rest. Oh, by the way, Grace, do you want to dance?"], ["Grace", "Mmm… why not? Let’s go!"], ["Francisco", "Great!"]]}, {"num": 94, "es": "La apuesta", "en": "The Bet", "es_lines": [["Janina", "¡Daniel! Por fin estás acá, ya estaba cansada de esperar por ti."], ["Daniel", "Sí, disculpa Jani. Había mucho tráfico y el autobús no avanzaba. Por fin pude llegar hasta ti. Tenía todo el día esperando llegar a las montañas. Quiero escalar desde hace un año."], ["Janina", "Sí, aunque mejor no hablemos tanto y pongámonos nuestro equipo; no te imaginas lo impaciente que estaba parada aquí. Además, ya hay otras personas escalando y eso me hizo sentirme más incómoda."], ["Daniel", "De nuevo disculpa. Bueno, ¿dónde está el equipo?"], ["Janina", "Acá, ya traje el de ambos. ¿Crees que puedes con esta pared después de tanto tiempo sin escalar? Yo pienso que no. Estás oxidado, amigo."], ["Daniel", "¿Qué? ¿Qué te pasa? Claro que puedo. Incluso creo que puedo escalarla más rápido que tú. Te lo demostraré."], ["Janina", "¡Debes estar bromeando! ¿En qué mundo escalarías tú una pared más rápido que yo? ¡Pff!"], ["Daniel", "Te sorprenderás cuando te enseñe."], ["Janina", "Pues entonces ¡hagamos una apuesta! El que suba más rápido gana el premio."], ["Daniel", "Interesante… ¿Cuál es el premio? Se me ocurren varias cosas…"], ["Janina", "¿Sí? ¿Como cuáles?"], ["Daniel", "Tengo mucha hambre, así que un buen almuerzo en un restaurante no estaría mal."], ["Janina", "¡Vamos entonces!"], ["Daniel", "¡Guao! Esto sí me está costando."], ["Janina", "¡Ja! Trata de alcanzarme, Daniel."], ["Daniel", "Ahí voy, sé que puedo…"], ["Janina", "Oh no, parece que sí me estás alcanzando. ¡Debo apurarme!"], ["Daniel", "Ni apurándote vas a poder. Verás, mi espíritu guerrero va a llevarme a la victoria."], ["Janina", "¡¿De qué rayos hablas?! ¡Sólo escala y no hables tanto!"], ["Daniel", "¡Listo! Alcancé la cima, ¡gané!"], ["Janina", "Demonios, es como si nunca hubieses dejado de escalar. Ahora tengo que brindarte el almuerzo."], ["Daniel", "Sí, y voy a querer una hamburgesa doble con queso, con una porción de papas fritas y una merengada de brownie. ¡Gracias, preciosa!"], ["Janina", "Te odio…"]], "en_lines": [["Janina", "Daniel! You’re finally here; I was getting tired of waiting for you."], ["Daniel", "Yeah, sorry Jani. There was a lot of traffic, and the bus couldn’t move forward. I’m finally here with you. I’ve been waiting to get these mountains all day. I have wanted to climb for a year now."], ["Janina", "Yeah, though we better not talk so much and start putting our gear on; you can’t imagine how impatient I’ve been here waiting. Furthermore, there are already other people climbing and it made me feel even more uncomfortable."], ["Daniel", "Sorry again. Okay, so where is the gear?"], ["Janina", "Here, I already grabbed one for each of us. Do you think you can climb this wall after spending so long without climbing? I don’t think so. You’re rusty, bro."], ["Daniel", "What? What’s wrong with you? Of course I can. I think I can even climb it faster than you. I’ll prove it to you."], ["Janina", "You must be kidding! In what world could you climb faster than me? Pff!"], ["Daniel", "You’ll be amazed when I show you I can."], ["Janina", "Well then, let’s bet on it! Whoever climbs to the top faster wins the prize."], ["Daniel", "Interesting… What is the prize? Several different things come to mind…"], ["Janina", "Yeah? Like what?"], ["Daniel", "I’m very hungry, so a nice full meal at a restaurant wouldn’t be a bad idea."], ["Janina", "Let’s go, then!"], ["Daniel", "Wow! This is really killing me."], ["Janina", "Ha! Catch me if you can, Daniel."], ["Daniel", "I’m on my way to; I know I can do it…"], ["Janina", "Oh no, it looks like you really are gaining on me. I have to hurry!"], ["Daniel", "Not even rushing to the top will you beat me. You’ll see, my warrior spirit will lead me to victory."], ["Janina", "What the heck?! Just be quiet and climb!"], ["Daniel", "Done! I’ve reached the summit and I’ve won!"], ["Janina", "Crud, it’s like you never stopped climbing at all. Now I have to buy you lunch."], ["Daniel", "Yeah, and I’m going to want a doble cheeseburger with a serving of fries and a brownie shake. Thanks, precious!"], ["Janina", "I hate you…"]]}, {"num": 95, "es": "Perdóname", "en": "Forgive Me", "es_lines": [["Rodrigo", "Oh, hola Paula. Ha pasado mucho tiempo, jamás pensé que te vería por estos lados."], ["Paula", "Sí, Rodrigo. No diré que estoy feliz de verte, porque eso es mentira. Las cosas no terminaron bien."], ["Rodrigo", "Tienes razón… No terminaron nada bien, y creo que te debo una disculpa."], ["Paula", "¿De verdad después de tanto aún quieres disculparte y reconocer tus errores?"], ["Rodrigo", "Sí, Paula. Yo siempre supe que estaba equivocado, pero el orgullo no me dejaba admitírtelo. Aún así, la consciencia me comía."], ["Paula", "Vaya, jamás pensé que escucharía estas palabras de tu boca, Rodrigo. Estoy sorprendida."], ["Rodrigo", "Todos nos equivocamos, aunque eso no me excusa. Fueron muchas mentiras; yo era muy inmaduro y no sabía lo que era valorar a una persona como tú. Eres una excelente chica, merecías mucho más y no te lo supe dar."], ["Paula", "Increíble que te tardaste dos años en darte cuenta de eso, ¿no?"], ["Rodrigo", "Sí, aunque la vida me ha castigado a su manera. No he conseguido a nadie que valga la pena desde que fuimos novios, y no tengo certeza de que alguna vez consiga, tampoco."], ["Paula", "Yo creo que sí, Rodrigo. Debes haber madurado y dejado esas actitudes atrás. Por algo te estás disculpando."], ["Rodrigo", "¿Y tú, tienes pareja?"], ["Paula", "Estoy saliendo con alguien, pero tampoco he tenido una relación seria desde que estuve contigo. Necesitaba un tiempo prudente para recuperarme; ni siquiera había salido con nadie hasta hace poco."], ["Rodrigo", "¿Y él te trata bien?"], ["Paula", "Es un caballero, la verdad. Hasta ahora me ha impresionado."], ["Rodrigo", "Estoy muy feliz por ti, Paula. Te lo mereces. Entonces… ¿estoy disculpado?"], ["Paula", "Sí, Rodrigo. Estás disculpado. Ahora dame un abrazo y olvidemos todo lo malo."]], "en_lines": [["Rodrigo", "Oh, hi Paula. It’s been so long, I never thought I’d see you around these parts."], ["Paula", "Yes, Rodrigo. I can’t say I’m happy to see you, because that would be a lie. Things between us ended badly."], ["Rodrigo", "You’re right… They didn’t end well at all, and I believe I owe you an apology."], ["Paula", "Even after so long are you willing to say sorry and recognize your mistakes?"], ["Rodrigo", "Yes, Paula. I always knew I had made a mistake, but pride didn’t let me demonstrate it. Even so, my conscious was eating at me."], ["Paula", "Wow, I never thought I’d hear those words from your mouth, Rodrigo. I’m amazed."], ["Rodrigo", "We all make mistakes, although that doesn’t excuse me. I lied too many times; I was simply too immature and didn’t know how to value a person like you. You’re an excellent girl, you deserved much more and I didn’t know how to give it to you."], ["Paula", "Incredible that it took you two whole years to realize that, ¿no?"], ["Rodrigo", "Yeah, although life has punished me in its own way. I haven’t found anyone worth it since we broke up, and I’m uncertain if I ever will."], ["Paula", "I believe you will, Rodrigo. You must have grown more mature and left that previous behavior behind. You’re saying sorry now, after all."], ["Rodrigo", "What about you, are you with anybody?"], ["Paula", "I’m going out with someone, but I haven’t had a serious relationship since we were together either. I needed a prudent time to recover; I hadn’t even gone out with anyone until this guy."], ["Rodrigo", "Does he treat you well?"], ["Paula", "He’s a gentleman to be honest. He’s impressed me so far."], ["Rodrigo", "I’m very happy for you, Paula. You deserve it. So… am I forgiven?"], ["Paula", "Yes, Rodrigo. You’re forgiven. Now give me a hug and let’s forget all of the bad stuff."]]}, {"num": 96, "es": "¡Cálmate, por favor!", "en": "Calm Down, Please!", "es_lines": [["Roberto", "No sé, ya no estoy seguro de querer viajar, Carmen. Estoy nervioso."], ["Carmen", "¿De qué hablas, Roberto? ¿Qué tienes que estás así, pálido?"], ["Roberto", "Malos presentimientos. No sé, creo que algo malo va a pasar."], ["Carmen", "¿Es por el vuelo?"], ["Roberto", "Sí, ¿acaso no has visto los accidentes de avión? Muchas veces no sobrevive nadie, o casi nadie. Además, pueden secuestrar el avión y ahí será terrible."], ["Carmen", "¿Estrellarnos? ¿Secuestros? Por favor, Roberto. ¿Esas son las cosas que te pasan por la mente? A la gente normal le preocupa si la comida del avión va a estar buena."], ["Roberto", "¡La gente normal piensa que todo estará bien siempre, por eso les pasan las cosas!"], ["Carmen", "¿Y acaso podrás hacer algo tú si sucede algo? ¿No, verdad?"], ["Roberto", "Al menos estaré prevenido. Oh rayos, ya nos toca abordar. ¡Tengo miedo!"], ["Carmen", "Me estás haciendo molestar, Roberto. ¡Compórtate! No debería tener que decirle eso a mi esposo, ¡pareces un gran bebé!"], ["Roberto", "¡He visto los casos donde los aviones se parten en el aire y comienzan a caer!"], ["Carmen", "¡Eso lo viste en una serie de televisión! ¡No me hagas molestar, deja de hablar así!"], ["Roberto", "Tengo mucho miedo. Ya no quiero ir a España, quiero quedarme. ¡Oh no, el avión ya está rodando, no, no! ¡Quiero bajarme!"], ["Carmen", "¡Baja la voz!"], ["Roberto", "De acuerdo, aunque ya está comenzando a subir. Aquí ocurren la mayoría de los accidentes, cuando—"], ["Carmen", "¡Ya, cállate!"], ["Roberto", "Ok…"], ["Carmen", "Disculpa, Roberto, pero admito que me estabas asustando."], ["Roberto", "Bueno, estás disculpada, pero discúlpame tú a mí por mi comportamiento. Ya estamos volando tranquilamente y no ha explotado el avión ni nada. Creo que era un ataque de pánico."], ["Carmen", "Eso es aceptable. No te preocupes. Vamos a calmarnos, escuchar música y leer unas revistas mientras volamos a nuestro destino."], ["Roberto", "Está bien. Para la próxima trataré de mentalizarme en que todo va a salir bien."], ["Carmen", "Sí, por favor."]], "en_lines": [["Roberto", "I don’t know, Carmen, I’m not so sure about wanting to travel anymore. I’m nervous."], ["Carmen", "What are you talking about, Roberto? Why are you so pale all of a sudden?"], ["Roberto", "Bad feelings. I don’t know, something bad is about to happen."], ["Carmen", "Is it about the flight?"], ["Roberto", "Yes, haven’t you seen the videos of plane accidents? Many times there are no survivors, or at least almost no survivors. In other occasions, they can hijack the plane and things turn really bad."], ["Carmen", "Crashing? Hijacking? Please, Roberto. Are those the things going through your head right now? Normal people care more about the plane’s meal actually being good."], ["Roberto", "Normal people think that things are always going to be okay, which is why bad things happen!"], ["Carmen", "Yeah, but if something happens will you be able to change it? No, right?"], ["Roberto", "At least I’ll be wary. Oh crap, it’s time to board the plane. I’m frightened!"], ["Carmen", "You’re making me angry, Roberto. Behave! I shouldn’t have to say that to my husband, you’re acting like a big baby!"], ["Roberto", "I’ve seen cases of planes breaking up in the sky and plummeting to the ground!"], ["Carmen", "You saw that on a TV show! Stop talking like that, don’t make me angry!"], ["Roberto", "I’m very scared. I don’t want to go to Spain anymore, I want to get off. Oh no, the plane is moving, no, no! Let me off this plane!"], ["Carmen", "Lower your voice!"], ["Roberto", "Okay, though it’s starting to rise. This is when most accidents take place, when—"], ["Carmen", "Enough, shut up!"], ["Roberto", "Ok…"], ["Carmen", "I’m sorry, Roberto, you were really starting to scare me."], ["Roberto", "Well you’re forgiven, but forgive me too for my behavior. We’re flying calmly now and the plane hasn’t exploded or anything. I think I was having a panic attack."], ["Carmen", "That’s aceptable. Don’t worry. Let’s calm down, listen to some music and read some magazines while we fly to our destination."], ["Roberto", "Fine. Next time I’ll just psyche myself up for a calm journey."], ["Carmen", "Yes, please."]]}, {"num": 97, "es": "Baby shower", "en": "Baby Shower", "es_lines": [["John", "¡Se acerca tu gran momento, Gabriela! ¿Cuántos meses tienes ya?"], ["Gabriela", "¡Sí, John! ¡Estoy super emocionada! Y bueno, ya tengo seis meses y medio. ¡El bebé está creciendo rápido y todos estamos ansiosos por conocerlo!"], ["John", "¿Lo? ¿Es un varón entonces? ¡Que alegría tan grande! Imagino que tu esposo está muy orgulloso."], ["Gabriela", "Por supuesto; él quería un bebé desde hace dos años, pero no habíamos tenido suerte. Y sí, es un pequeño varoncito. Le pondremos Vicente, como su abuelo, el cual hubiese querido conocerlo."], ["John", "Sí, tu padre era un gran hombre. Es una bella dedicatoria que le escojas ese nombre al bebé. Pero bueno, no más recuerdos tristes, ¿cuéntame cuándo es el baby shower?"], ["Gabriela", "En dos semanas, John. ¡Tienes que ir! Has sido mi mejor amigo desde la universidad, y aquel bello hombre que me ha apoyado tanto."], ["John", "¡Bueno, te diré desde ya que jamás faltaría! Eso sí, dígame qué debo llevar y lo haré. ¡Ya sabes cuánto amo las fiestas!"], ["Gabriela", "Bueno, primeramente necesito una buena repostera para el pastel; luego creo que necesitaré entradas para los invitados. Las personas que tenía pensadas para esas tareas no van a poder. No quiero que se dañe la fiesta por eso, John."], ["John", "Cuenta conmigo, mi querida Gaby. Yo tengo una prima que es dueña de una agencia de festejo, y seguramente va a resolverte todo por un precio económico."], ["Gabriela", "No te creo, ¿en serio? ¡Siempre me salvas la vida, mi amigo bello!"], ["John", "Tú sólo concéntrate en comer bien y descansar para que ese bebé nazca sano, inteligente y hermoso como su madre."], ["Gabriela", "Me haces sonrojar. Bueno, entonces toma mi número y estamos en contacto para hablar con tu prima. No lo olvides."], ["John", "Jamás. La llamaré esta misma tarde. ¡Fue un placer verte, Gabriela!"], ["Gabriela", "¡Igual tú, cuídate!"]], "en_lines": [["John", "Your big moment is coming, Gabriela! How many months is it now?"], ["Gabriela", "Yeah, John! I’m super excited! And, well, six months and a half. The baby is growing quickly and we’re all anxious to meet him!"], ["John", "Him? So it’s a little boy, then? What wonderful news! I imagine that your husband is very proud."], ["Gabriela", "Of course; he’s wanted a baby for two years, but we hadn’t had any luck. And yes, he’s a little boy. We’ll call him Vicente, just like his grandpa, who would have loved to meet him."], ["John", "Yes, your father was a wonderful man. It’s a beautiful tribute that you’re giving your son his name. Anyway, no more sad memories; when is the baby shower?"], ["Gabriela", "In two weeks, John. You must go! You’ve been my best friend since university, and that beautiful man that has supported me so many times."], ["John", "Well, let me tell you now that I’d never miss it! That said; tell me what I must help with and I’ll get it. You know how much I love parties!"], ["Gabriela", "Well, firstly I need a good pastry chef for the cake; and then I’ll need appetizers for the guests. The people I had in mind for those tasks won’t be available. I don’t want the party to fall apart because of that, John."], ["John", "Count on me, my beloved Gaby. I have a female cousin who’s in charge of an event agency, and she’ll surely deal with everything for a cheaper price."], ["Gabriela", "I can’t believe it, really? You always save my life, my gorgeous friend!"], ["John", "You just concentrate on eating well and resting so that baby is born as healthy, intelligent and cute as his mother."], ["Gabriela", "You make me blush. Well, take my number then and we’ll stay in contact so that we can talk to your cousin. Don’t forget."], ["John", "Never. I’ll call her this same afternoon. It was a pleasure seeing you, Gabriela!"], ["Gabriela", "Same to you, take care!"]]}, {"num": 98, "es": "Evadiendo responsabilidades", "en": "Evading Responsibilities", "es_lines": [["Tomás", "Hola Irene, ¿cómo estás? ¿Aún vas a venir a mi casa para hacer la tarea?"], ["Irene", "¡Sí, Tomás! Precisamente venía a decirte que ya estoy lista para ir. Tenemos que avanzar; la asignación es para mañana y no hemos hecho nada."], ["Tomás", "Por supuesto, no podemos dejar eso para más adelante. Ya los otros grupos están trabajando."], ["Irene", "Sí, y esa materia es muy importante. No podemos salir mal, o podríamos tener que repetirla el semestre que viene. Eso sería una tragedia."], ["Tomás", "Exacto. Mejor vayamos andando a mi casa para aprovechar el tiempo."], ["Irene", "Perfecto. Apenas lleguemos quiero empezar."], ["Tomás", "Bueno, ya estamos acá. Aun así, tengo hambre. ¿Tú no? Comamos primero."], ["Irene", "Preferiría que comencemos a trabajar, pero bueno está bien."], ["Tomás", "Gracias por entender. Voy a preparar algo. De acuerdo, ya está preparado. Vamos a comer."], ["Irene", "Comamos rápido para poder comenzar. En serio me preocupa el poco tiempo que nos queda para la fecha de entrega."], ["Tomás", "Claro, sí. Bueno, ya comimos. Pero tampoco podemos trabajar acabando de comer. Mejor descansamos un rato, ¿no crees?"], ["Irene", "No me parece, deberíamos empezar ya. Por favor, tratemos de que el descanso sea breve."], ["Tomás", "Oye, ¿no has jugado el nuevo videojuego de realidad virtual? Lo tengo aquí, tienes que probarlo."], ["Irene", "¡¿Qué?! ¡¿Jugar?! Tenemos que terminar la asignación, Tomás."], ["Tomás", "Es sólo un momento."], ["Irene", "Ok, pero sólo si vamos a trabajar apenas terminemos. Vaya, sí es increíble este juego. Me encanta. Ah, me morí. Voy a intentar de nuevo."], ["Tomás", "Sí, tiene un alto grado de dificultad este juego. Me vuelve loco a veces. Bueno, tengo otro juego, si quieres intentarlo."], ["Irene", "Sí, buena idea. Un momento, ¿qué hora es?"], ["Tomás", "Las seis de la tarde."], ["Irene", "¡¿Qué?! ¡Ya tenemos tres horas aquí y no hemos avanzado en nada!"], ["Tomás", "¡Guao! ¿Cierto, ahora qué haremos?"], ["Irene", "Guarda todo y vamos a empezar, ¡ya basta de juegos y distracciones!"], ["Tomás", "Está bien, está bien. Sólo tenías que decirlo desde un principio…"], ["Irene", "Eres un caso perdido…"]], "en_lines": [["Tomás", "Hello Irene, how are you? Are you still coming to my house to the schoolwork?"], ["Irene", "Yes, Tomas! I was precisely coming towards you to tell you that I’m ready. We have to make progress; the assignment is due for tomorrow and we haven’t advanced at all."], ["Tomás", "Of course, we can’t leave it for later on. The other student groups are already working on it."], ["Irene", "Yeah, and that subject is very important. We can’t fail, or there’s a chance we could have to repeat it next semester. That would be a tragedy."], ["Tomás", "Exactly. Let’s start walking towards my house so we can avoid wasting time."], ["Irene", "Perfect. I want to start as soon as we arrive."], ["Tomás", "Well, we’re here. Even so, I feel very hungry. What about you? Let’s eat first."], ["Irene", "I’d prefer that we begin as soon as possible, but it’s okay I guess."], ["Tomás", "Thanks for understanding. I’m going to prepare something right now. Okay, it’s done. Let’s eat."], ["Irene", "We have to eat quickly so we can advance. I’m really worried about how little time we have before we have to turn it in."], ["Tomás", "Sure, yeah. Well, we’re done eating. But we can’t exactly start working if we’ve just eaten. Let’s rest for a moment, don’t you think?"], ["Irene", "No, I don’t think so, we should start right away. But please, let’s try to make the rest brief."], ["Tomás", "Hey, haven’t you tried the newest virtual reality video game? I have a copy here, you have to try it."], ["Irene", "What?! Play games?! We have to finish the assignment, Tomas."], ["Tomás", "It’s just a moment."], ["Irene", "Ok, but only if we’re going to work as soon as we’re done. Wow, the game certainly is amazing. I love it. Ah, I died. I’m going to try again."], ["Tomás", "Yeah, the game has a very high difficulty level. It drives me nuts sometimes. Well, I also have another game if you want to play it."], ["Irene", "Yeah, good idea. One moment, what time is it?"], ["Tomás", "Its six o’ clock."], ["Irene", "What?! We’ve been here for three hours and haven’t made any progress at all!"], ["Tomás", "Wow! True, now what?"], ["Irene", "Put everything away and let’s begin, enough games and distractions!"], ["Tomás", "Alright, alright. You only had to say that from the beginning…"], ["Irene", "You’re a lost cause…"]]}, {"num": 99, "es": "¿Cómo explico esto?", "en": "How Do I Explain This?", "es_lines": [["Mariana", "¿Hijo? ¿Hijo? ¿Dónde estás que te he buscado por todas partes? Ah, ya te ví hijo, ¡no te escondas!"], ["José", "¡Oh no, espera un momento, mamá! No entres al balcón aún, ¡ya va!"], ["Mariana", "¿Por qué? ¡Voy a entrar! Un momento, este balcón tiene un olor fuerte. Dime la verdad, José."], ["José", "Mamá, por favor, no te molestes conmigo. ¡Por favor!"], ["Mariana", "¿Estabas fumando, verdad? Que decepción, hijo. De verdad no pensé que caerías en eso."], ["José", "Tú también fumas, mamá. De verdad no es lo peor del mundo."], ["Mariana", "No importa si yo fumo, José. Tú tienes dieciseis años. Esto es un desastre, tendré que contarle todo a tu papá."], ["José", "¡No, ya va, ten piedad de mí, mamá! ¡Él no debe saber nada!"], ["Mariana", "Pero hiciste algo que te prohibimos. ¿Qué más puedo hacer? Nunca imaginé que te encontraría fumando."], ["José", "No es mi culpa, es que todos en la escuela están fumando y me hizo introducirme en ese mundo."], ["Mariana", "¡¿Qué?! ¿Todos?"], ["José", "Sí, en serio puedo explicarlo todo. ¡No le cuentes a mi papá y escúchame!"], ["Mariana", "No sé, hijo. No me parece que estás en condiciones de estarme exigiendo en este momento."], ["José", "Lo que pasa es que quiero estar seguro de que no vas a contarle. Bueno, mis amigos comenzaron hace unos meses, y no pensé que yo también empezaría. Pero lo hice. De verdad, no sé qué hacer. ¡Ayúdame, mamá!"], ["Mariana", "Mmm… ya no estoy tan molesta. No quieres continuar, por lo visto, pero la presión de tus amigos te hace seguir. ¿Cierto?"], ["José", "Exacto. No puedo ir contra la corriente, mamá."], ["Mariana", "Está bien. Ahora que entiendo mejor, voy a tratar de ayudarte. Esto no saldrá de entre nosotros, te lo prometo."], ["José", "De verdad, ¡gracias mamá! Sabía que podía contar contigo para lo que fuera."]], "en_lines": [["Mariana", "Son? Son? Where are you, I’ve looked everywhere and can’t find you? Ah, I see you, son, don’t hide from me!"], ["Jose", "Oh no, wait a minute, mom! Don’t come into the balcony yet, wait!"], ["Mariana", "Why? I’m going in! Wait a sec, this balcony has a strong smell to it. Tell me the truth about what you were just doing, Jose."], ["Jose", "Mom, please, don’t get angry at me. Please!"], ["Mariana", "You were smoking, weren’t you? What a disappointment, son. I really didn’t imagine you’d start doing that."], ["Jose", "You smoke too, mom. It really isn’t the worst thing in the world."], ["Mariana", "It doesn’t matter if I smoke or not, Jose. You’re sixteen years old. This is a disaster, I’m going to have to tell your dad."], ["Jose", "No, wait, have mercy on me, mom! He musn’t know anything!"], ["Mariana", "But you did something we forbid you from doing. What else can I do? I never imagined I’d find you smoking."], ["Jose", "It’s not my fault, it’s just that everyone at school is smoking, and I was slowly introduced to the habit."], ["Mariana", "What?! All of them?"], ["Jose", "Yes, I really can explain everything. Don’t tell my dad and just listen!"], ["Mariana", "I don’t know, son. I don’t think you’re in conditions to demand anything from me right now."], ["Jose", "What I want to make sure is that you won’t tell him. Anyway, my friends started a few months ago, and I didn’t think I’d also end up doing it. But I did. I really, really don’t know what to do. Help me, mom!"], ["Mariana", "Mmm… I’m no longer as angry anymore. You don’t want to keep smoking, but by the looks of things, peer pressure is making you continue. Right?"], ["Jose", "Exactly. I can’t go against the flow, mom."], ["Mariana", "Fine. Now that I understand better, I’m going to try to help you. This won’t leave the two of us, I promise you."], ["Jose", "Really, thank you mom! I knew I could trust you with whatever I needed."]]}, {"num": 100, "es": "Peligro", "en": "Danger", "es_lines": [["Alejandro", "¡Estoy cansado, ha sido un día muy largo para mi gusto! No veo la hora de que lleguemos a la estación de tren."], ["Natalia", "Sí, hoy no ha sido fácil para ninguno de los dos. Pero no te preocupes, que estaremos en casa en cualquier momento."], ["Alejandro", "Eh, ¿Natalia? No voltees descaradamente, pero esos tipos que vienen detrás de nosotros tienen rato siguiéndonos, creo."], ["Natalia", "Déjame ver… mmm, ¿sí? No me había dado cuenta. Y vienen mirándonos. Esto es muy raro, ¿qué hacemos?"], ["Alejandro", "Apura el paso y vamos a tratar de evadirlos. No voltees más."], ["Natalia", "De acuerdo, aunque ya estoy nerviosa."], ["Alejandro", "No temas, sólo caminemos rápido y con cuidado. Rápido, sígueme por aquí."], ["Natalia", "De acuerdo, por acá también podemos llegar a la estación de tren. ¿Será que quieren robarnos?"], ["Alejandro", "Eso creo. Es tarde y no hay tantas personas en la calle. Seguro quieren asaltarnos; no nos quedemos para averiguarlo."], ["Natalia", "Sí, tienes razón. Por acá hay unas escaleras que llevan más cerca a la estación, vamos."], ["Alejandro", "Sí, mejor. Oye, creo que no nos están siguiendo ya. ¡No, ya va, ahí vienen! ¡Definitivamente nos están siguiendo!"], ["Natalia", "¡No me gusta esto! ¡Llamemos a la policía!"], ["Alejandro", "Cálmate, no hay policías cerca. Entra aquí y sigamos adelante. Casi los perdemos ya verás."], ["Natalia", "Ah, entiendo, ¡ahí está el tren! ¡Vamos!"], ["Alejandro", "¡Guao! Eso estuvo cerca, mi amor. No salgamos más a esta hora por la ciudad, no es nada segura. No quiero que nos pase nada."], ["Natalia", "Ni yo. Ahora vamos a casa, nos me
